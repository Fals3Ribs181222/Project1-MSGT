<body>

                <li><a href="about" class="navbar__link">About</a></li>
                <li><a href="testimonials" class="navbar__link navbar__link--active">Testimonials</a></li>
                <li><a href="results" class="navbar__link">Results</a></li>
                <li><a href="login" class="navbar__link">Login</a></li>
            </ul>
        </div>
    </nav>

    <!-- Mobile slide-in nav sidebar -->
    <aside class="dash-sidebar dash-sidebar--floating" id="dashSidebar">
        <div class="dash-sidebar__top">
            <span class="dash-sidebar__brand"><i class="ri-book-2-line" aria-hidden="true"></i> TuteFlow</span>
        </div>
        <nav class="dash-sidebar__nav">
            <a href="index" class="dash-sidebar__item"><i class="ri-home-line" aria-hidden="true"></i> Home</a>
            <a href="about" class="dash-sidebar__item"><i class="ri-user-3-line" aria-hidden="true"></i> About</a>
            <a href="testimonials" class="dash-sidebar__item dash-sidebar__item--active"><i class="ri-star-line" aria-hidden="true"></i> Testimonials</a>
            <a href="results" class="dash-sidebar__item"><i class="ri-bar-chart-line" aria-hidden="true"></i> Results</a>
            <a href="login" class="dash-sidebar__item"><i class="ri-login-box-line" aria-hidden="true"></i> Login</a>
        </nav>
    </aside>
    <div class="dash-sidebar-backdrop" id="sidebarBackdrop"></div>

    <main>
        <!-- Interactive Hero Section -->
        <section class="hero-interactive" id="heroInteractive">
            <div class="hero-interactive__content">
                <h1 class="hero-interactive__title">Success Stories from Our Alumni</h1>
                <p class="hero-interactive__subtitle">Hear from our alumni who have achieved extraordinary results in
                    their board exams.</p>
            </div>
            <!-- Floating media elements injected via JS -->
            <div id="heroMediaContainer" class="hero-interactive__media-container"></div>
        </section>

        <!-- Lower Section -->
        <section class="container section">
            <div class="masonry-grid" id="testimonialsList" role="list">
                <div class="empty-state" id="loadingMsg">
                    Loading testimonials...
                </div>
            </div>
        </section>
    </main>

    <!-- Testimonial full-text modal -->
    <div id="testimonialModal" class="testimonial-modal" role="dialog" aria-modal="true" aria-hidden="true">
        <div class="testimonial-modal__backdrop"></div>
        <div class="testimonial-modal__box">
            <button class="testimonial-modal__close" aria-label="Close">&times;</button>
            <p class="testimonial-modal__text" id="testimonialModalText"></p>
            <div class="testimonials__author" style="border-top:1px solid var(--glass-border);padding-top:1rem;margin-top:1.5rem;">
                <div class="testimonials__avatar" id="testimonialModalAvatar"></div>
                <div class="testimonials__author-info">
                    <h4 id="testimonialModalName"></h4>
                    <p id="testimonialModalMeta"></p>
                </div>
            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/masonry-layout@4/dist/masonry.pkgd.min.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const testimonialsList = document.getElementById('testimonialsList');
            const heroMediaContainer = document.getElementById('heroMediaContainer');
            const loadingMsg = document.getElementById('loadingMsg');

            const response = await api.get('testimonials', {}, 'id, student_name, subject, year, testimonial_text, media_url, media_type, youtube_video_id, created_at');

            if (response.success && response.data && response.data.length > 0) {
                loadingMsg.style.display = 'none';

                // Render all testimonials into one unified grid
                response.data.forEach(item => {
                    testimonialsList.appendChild(createTestimonialCard(item));
                });

                // Masonry — disabled on mobile to prevent narrow inline widths
                let masonryInstance = null;
                function initMasonryLayout() {
                    if (window.innerWidth > 768) {
                        if (!masonryInstance) {
                            masonryInstance = new Masonry('#testimonialsList', {
                                itemSelector: '.testimonials__card',
                                gutter: 20,
                                percentPosition: true
                            });
                        } else {
                            masonryInstance.layout();
                        }
                    } else {
                        if (masonryInstance) { masonryInstance.destroy(); masonryInstance = null; }
                    }
                }
                setTimeout(initMasonryLayout, 100);
                window.addEventListener('resize', initMasonryLayout);

                setupHeroParallax(response.data.slice(0, 10), heroMediaContainer);

            } else {
                loadingMsg.textContent = response.error ? `Error: ${response.error}` : 'No testimonials found yet.';
                if (response.error) loadingMsg.className = 'empty-state status--error';
            }
        });

        function createTestimonialCard(item) {
            const card = createElement('article', 'testimonials__card');
            card.setAttribute('role', 'listitem');
            const studentName = item.student_name || 'Student';

            // YouTube Shorts embed
            if (item.youtube_video_id) {
                const mediaWrapper = createElement('div', 'testimonials__media');
                const iframe = document.createElement('iframe');
                iframe.src = `https://www.youtube.com/embed/${item.youtube_video_id}`;
                iframe.title = `${studentName}'s video testimonial`;
                iframe.setAttribute('allow', 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture');
                iframe.setAttribute('allowfullscreen', '');
                iframe.loading = 'lazy';
                mediaWrapper.appendChild(iframe);
                card.appendChild(mediaWrapper);
            } else if (item.media_url) {
                const mediaWrapper = createElement('div', 'testimonials__media');
                const img = document.createElement('img');
                img.src = item.media_url;
                img.alt = `${studentName}'s testimonial photo`;
                img.loading = 'lazy';
                img.onload = () => { const m = Masonry.data('#testimonialsList'); if (m) m.layout(); };
                mediaWrapper.appendChild(img);
                card.appendChild(mediaWrapper);
            }

            // Quote text (skip for pure video cards)
            if (!item.youtube_video_id) {
                const fullText = item.testimonial_text || '';
                const LIMIT = 180;
                const isLong = fullText.length > LIMIT;
                const text = createElement('p', 'testimonials__text');
                text.textContent = isLong ? `"${fullText.slice(0, LIMIT).trimEnd()}…"` : (fullText ? `"${fullText}"` : '');
                card.appendChild(text);
                if (isLong) {
                    const btn = createElement('button', 'testimonials__read-more', 'Read more');
                    btn.addEventListener('click', () => openTestimonialModal(fullText, studentName, item));
                    card.appendChild(btn);
                }
            }

            // Author row
            const authorDiv = createElement('div', 'testimonials__author');
            authorDiv.appendChild(createElement('div', 'testimonials__avatar', studentName.charAt(0)));
            const info = createElement('div', 'testimonials__author-info');
            info.appendChild(createElement('h4', '', studentName));
            const meta = [item.subject, item.year ? `Batch ${item.year}` : null].filter(Boolean).join(' | ');
            info.appendChild(createElement('p', '', meta));
            authorDiv.appendChild(info);
            card.appendChild(authorDiv);

            return card;
        }

        function openTestimonialModal(fullText, studentName, item) {
            const modal = document.getElementById('testimonialModal');
            document.getElementById('testimonialModalText').textContent = `"${fullText}"`;
            document.getElementById('testimonialModalAvatar').textContent = studentName.charAt(0);
            document.getElementById('testimonialModalName').textContent = studentName;
            const meta = [item.subject, item.year ? `Batch ${item.year}` : null].filter(Boolean).join(' | ');
            document.getElementById('testimonialModalMeta').textContent = meta;
            modal.setAttribute('aria-hidden', 'false');
            modal.classList.add('testimonial-modal--open');
            document.body.style.overflow = 'hidden';
            // Focus trap: move focus into modal
            modal.querySelector('.testimonial-modal__close').focus();
        }

        function closeTestimonialModal() {
            const modal = document.getElementById('testimonialModal');
            modal.setAttribute('aria-hidden', 'true');
            modal.classList.remove('testimonial-modal--open');
            document.body.style.overflow = '';
        }

        document.addEventListener('DOMContentLoaded', () => {
            const modal = document.getElementById('testimonialModal');
            modal.querySelector('.testimonial-modal__close').addEventListener('click', closeTestimonialModal);
            modal.querySelector('.testimonial-modal__backdrop').addEventListener('click', closeTestimonialModal);
            document.addEventListener('keydown', e => {
                if (e.key === 'Escape') { closeTestimonialModal(); return; }
                // Focus trap: keep Tab cycling inside modal when open
                if (e.key === 'Tab' && modal.classList.contains('testimonial-modal--open')) {
                    const focusable = Array.from(modal.querySelectorAll('button, [href], input, [tabindex]:not([tabindex="-1"])'));
                    if (!focusable.length) return;
                    const first = focusable[0], last = focusable[focusable.length - 1];
                    if (e.shiftKey) { if (document.activeElement === first) { e.preventDefault(); last.focus(); } }
                    else { if (document.activeElement === last) { e.preventDefault(); first.focus(); } }
                }
            });
        });

        function setupHeroParallax(items, container) {
            // Measure the frosted content box position to derive safe left/right strips
            const hero = document.getElementById('heroInteractive');
            const contentBox = hero.querySelector('.hero-interactive__content');
            const heroRect = hero.getBoundingClientRect();
            const boxRect = contentBox.getBoundingClientRect();
            const deadLeft = ((boxRect.left - heroRect.left) / heroRect.width) * 100;
            const deadRight = ((boxRect.right - heroRect.left) / heroRect.width) * 100;
            // Safe strip widths (with a small buffer inside each edge)
            const leftMax = Math.max(deadLeft - 2, 2);
            const rightMin = Math.min(deadRight + 2, 98);

            items.forEach((item, index) => {
                const el = document.createElement('div');
                el.className = 'hero-interactive__element';

                // Alternate strictly between left strip and right strip
                let top, left;
                const isLeft = index % 2 === 0;
                if (isLeft) {
                    left = 1 + Math.random() * (leftMax - 1);
                } else {
                    left = rightMin + Math.random() * (97 - rightMin);
                }
                // Spread vertically across 10–70% of hero height
                top = 10 + Math.random() * 55;

                el.style.top = `${top}%`;
                el.style.left = `${left}%`;

                // Add random scale
                const scale = 0.5 + Math.random() * 0.7; // Range: 0.5 to 1.2
                el.style.transform = `scale(${scale})`;

                // Set data attributes for parallax speed depending on perceived depth
                const depth = 0.5 + Math.random() * 1.5;
                el.setAttribute('data-depth', depth);

                if (item.youtube_video_id) {
                    const img = document.createElement('img');
                    img.src = `https://img.youtube.com/vi/${item.youtube_video_id}/hqdefault.jpg`;
                    img.alt = '';
                    el.appendChild(img);
                } else if (item.media_url) {
                    const img = document.createElement('img');
                    img.src = item.media_url;
                    el.appendChild(img);
                } else {
                    // Fallback to text snippet if no media
                    const p = document.createElement('p');
                    p.textContent = `"${item.testimonial_text.substring(0, 40)}..."`;
                    el.appendChild(p);
                    el.classList.add('hero-interactive__element--text');
                }

                container.appendChild(el);
            });

            // GSAP Hover Scale Logic — skipped when user prefers reduced motion
            const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
            if (!prefersReducedMotion) {
                gsap.utils.toArray('.hero-interactive__element').forEach(el => {
                    const currentTransform = el.style.transform;
                    const baseScale = currentTransform.includes('scale(')
                        ? parseFloat(currentTransform.split('scale(')[1])
                        : 1;

                    el.addEventListener('mouseenter', () => {
                        gsap.to(el, { scale: baseScale * 1.15, duration: 0.3, ease: 'power2.out', zIndex: 100 });
                    });

                    el.addEventListener('mouseleave', () => {
                        gsap.to(el, { scale: baseScale, duration: 0.3, ease: 'power2.out', zIndex: 1 });
                    });
                });
            }
        }
    </script>
</body>

</html>
