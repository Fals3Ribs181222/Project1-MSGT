<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Read success stories from our alumni who achieved extraordinary results in their ISC board exams.">
    <title>Testimonials | Mitesh Sir's Group Tuitions</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <!-- Navigation -->
    <nav class="navbar" aria-label="Main navigation">
        <div class="container navbar__container">
            <a href="index.html" class="navbar__logo">Mitesh Sir's Group Tuitions</a>
            <ul class="navbar__links">
                <li><a href="index.html" class="navbar__link">Home</a></li>
                <li><a href="testimonials.html" class="navbar__link navbar__link--active">Testimonials</a></li>
                <li><a href="results.html" class="navbar__link">Results</a></li>
                <li><a href="login.html" class="navbar__link">Login</a></li>
            </ul>
        </div>
    </nav>

    <main class="container section">
        <header class="section__header">
            <h1 class="section__title">Student Success Stories</h1>
            <p>Hear from our alumni who have achieved extraordinary results in their board exams.</p>
        </header>

        <div class="testimonials" id="testimonialsList" role="list">
            <div class="empty-state" id="loadingMsg">
                Loading testimonials...
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer__bottom">
                <p>&copy; 2026 Mitesh Sir's Group Tuitions. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const list = document.getElementById('testimonialsList');
            const loadingMsg = document.getElementById('loadingMsg');

            const response = await api.get('testimonials', {}, 'id, student_name, subject, year, testimonial_text, media_url, media_type, created_at');

            if (response.success && response.data && response.data.length > 0) {
                list.innerHTML = '';
                response.data.forEach(item => {
                    const card = createElement('article', 'testimonials__card');
                    card.setAttribute('role', 'listitem');

                    if (item.media_url) {
                        const mediaWrapper = createElement('div', 'testimonials__media');
                        if (item.media_type && item.media_type.startsWith('video/')) {
                            const video = document.createElement('video');
                            video.src = item.media_url;
                            video.controls = true;
                            video.preload = "metadata";
                            mediaWrapper.appendChild(video);
                        } else {
                            const img = document.createElement('img');
                            img.src = item.media_url;
                            img.alt = `${studentName}'s Testimonial Photo`;
                            img.loading = 'lazy';
                            mediaWrapper.appendChild(img);
                        }
                        card.appendChild(mediaWrapper);
                    }

                    const text = createElement('p', 'testimonials__text', `"${item.testimonial_text || ''}"`);
                    card.appendChild(text);

                    const authorDiv = createElement('div', 'testimonials__author');

                    const studentName = item.student_name || 'Student';
                    const initial = studentName.charAt(0);
                    const avatar = createElement('div', 'testimonials__avatar', initial);
                    authorDiv.appendChild(avatar);

                    const info = createElement('div', 'testimonials__author-info');
                    info.appendChild(createElement('h4', '', studentName));

                    const subsetInfo = [];
                    if (item.subject) subsetInfo.push(item.subject);
                    if (item.year) subsetInfo.push(`Batch ${item.year}`);

                    info.appendChild(createElement('p', '', subsetInfo.join(' | ')));
                    authorDiv.appendChild(info);

                    card.appendChild(authorDiv);
                    list.appendChild(card);
                });
            } else {
                loadingMsg.textContent = response.error ? `Error: ${response.error}` : 'No testimonials found yet.';
                if (response.error) loadingMsg.style.color = 'red';
            }
        });
    </script>
</body>

</html>
