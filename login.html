<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <meta name="description" content="Login to access the Mitesh Sir's Study Circle student or teacher portal.">
    <title>Login | Mitesh Sir's Study Circle</title>
    <link rel="icon" href="logo.png">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <nav class="navbar" aria-label="Main navigation">
        <div class="navbar__container" style="padding: 0 2rem;">
            <button class="navbar__toggle" aria-label="Toggle navigation" aria-expanded="false">☰</button>
            <a href="index" class="navbar__logo"><img src="logo.png" alt="Mitesh Sir's Study Circle" style="height:70px;width:auto;display:block;"><span style="font-size:1rem;font-weight:700;color:var(--text-primary,#1a1a2e);white-space:nowrap;">Mitesh Sir's Study Circle</span></a>
            <ul class="navbar__links" style="background:none;border:none;padding:0;gap:0.25rem;">
                <li><a href="index" class="navbar__link">Home</a></li>
                <li><a href="about" class="navbar__link">About</a></li>
                <li><a href="testimonials" class="navbar__link">Testimonials</a></li>
                <li><a href="results" class="navbar__link">Results</a></li>
                <li><a href="login" class="navbar__link navbar__link--active">Login</a></li>
            </ul>
        </div>
    </nav>

    <!-- Mobile slide-in nav sidebar -->
    <aside class="dash-sidebar dash-sidebar--floating" id="dashSidebar">
        <div class="dash-sidebar__top">
            <a href="index"><img src="logo.png" alt="Mitesh Sir's Study Circle" style="height:72px;width:auto;"></a>
        </div>
        <nav class="dash-sidebar__nav">
            <a href="index" class="dash-sidebar__item">🏠 Home</a>
            <a href="about" class="dash-sidebar__item">👨‍🏫 About</a>
            <a href="testimonials" class="dash-sidebar__item">⭐ Testimonials</a>
            <a href="results" class="dash-sidebar__item">📊 Results</a>
            <a href="login" class="dash-sidebar__item dash-sidebar__item--active">🔑 Login</a>
        </nav>
    </aside>
    <div class="dash-sidebar-backdrop" id="sidebarBackdrop"></div>

    <main class="container">
        <div class="login">
            <div class="login__card">
                <header class="login__header">
                    <h1>Welcome Back</h1>
                </header>



                <form id="loginForm" novalidate>
                    <div class="form__group">
                        <label class="form__label" for="username">Username</label>
                        <input type="text" id="username" class="form__control" required
                            placeholder="Enter your username" autocomplete="username">
                    </div>
                    <div class="form__group">
                        <label class="form__label" for="password">Password</label>
                        <input type="password" id="password" class="form__control" required placeholder="••••••••"
                            autocomplete="current-password">
                    </div>

                    <button type="submit" class="btn btn--primary btn--full" id="submitBtn">
                        <span id="btnText">Sign In</span>
                        <span class="spinner" id="btnSpinner" aria-hidden="true"></span>
                    </button>

                    <p class="form__error" id="errorMsg" role="alert"></p>
                </form>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/utils.js"></script>
    <script src="js/app.js"></script>
    <script>
        // If already logged in, redirect
        const user = auth.getUser();
        if (user) {
            auth.redirect(user.role);
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');

            errorMsg.style.display = 'none';
            btnText.style.display = 'none';
            btnSpinner.style.display = 'inline-block';
            submitBtn.disabled = true;

            const response = await auth.login(username, password);

            if (!response.success) {
                btnText.style.display = 'inline-block';
                btnSpinner.style.display = 'none';
                submitBtn.disabled = false;
                errorMsg.textContent = response.error || 'Invalid credentials. Please try again.';
                errorMsg.style.display = 'block';
            }
            // Successful login handles redirect inside auth.login
        });
    </script>
</body>

</html>
