<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration | Mitesh Sir's Study Circle</title>
    <meta name="description" content="Register as a student at Mitesh Sir's Study Circle. Fill in your details and your teacher will set up your account.">
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css">

    <style>
        body {
            background: var(--bg-base);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2.5rem 1rem 3rem;
        }

        .reg-wrap {
            width: 100%;
            max-width: 560px;
        }

        .reg-brand {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .reg-brand__icon {
            width: 3rem;
            height: 3rem;
            border-radius: var(--radius-lg);
            background: var(--primary);
            color: #fff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            margin-bottom: 0.75rem;
        }

        .reg-brand h1 {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text-main);
            margin: 0 0 0.2rem;
        }

        .reg-brand p {
            font-size: 0.82rem;
            color: var(--text-muted);
            margin: 0;
        }

        .reg-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 2rem;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
        }

        .reg-section {
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.09em;
            color: var(--text-muted);
            margin: 1.5rem 0 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .reg-section:first-child { margin-top: 0; }

        .reg-section::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        .reg-grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
        }

        .reg-grid-full { grid-column: 1 / -1; }

        .reg-pills {
            display: flex;
            gap: 0.5rem;
        }

        .reg-pills .subject-pill { flex: 1; }
        .reg-pills .subject-pill__label { display: block; text-align: center; }

        .reg-academic {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 0.75rem;
            align-items: start;
        }

        /* Accessible focus ring on all interactive elements */
        input:focus-visible,
        select:focus-visible,
        button:focus-visible {
            outline: 3px solid var(--primary);
            outline-offset: 2px;
        }

        /* Ensure minimum 44px touch targets on submit */
        .btn { min-height: 2.75rem; }

        .reg-success {
            text-align: center;
            padding: 1.5rem 0 0.5rem;
        }

        .reg-success__circle {
            width: 4rem;
            height: 4rem;
            border-radius: 50%;
            background: rgba(16, 185, 129, 0.1);
            border: 2px solid rgba(16, 185, 129, 0.25);
            color: #10b981;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin: 0 auto 1.25rem;
        }

        .reg-success h2 {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-main);
            margin: 0 0 0.5rem;
        }

        .reg-success p {
            font-size: 0.88rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin: 0 0 1.5rem;
        }

        .reg-footer {
            text-align: center;
            margin-top: 1.25rem;
            font-size: 0.82rem;
            color: var(--text-muted);
        }

        .reg-footer a {
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
        }

        .reg-footer a:hover { text-decoration: underline; }

        @media (max-width: 480px) {
            .reg-card { padding: 1.25rem; }
            .reg-academic { grid-template-columns: 1fr 1fr; }
            .reg-academic > :last-child { grid-column: 1 / -1; }
        }
    </style>
</head>
<body>
    <div class="reg-wrap">
        <!-- Brand -->
        <div class="reg-brand">
            <div class="reg-brand__icon"><i class="ri-graduation-cap-line"></i></div>
            <h1>Mitesh Sir's Study Circle</h1>
            <p>ISC Accountancy Coaching &bull; Mumbai</p>
        </div>

        <!-- Card -->
        <div class="reg-card">

            <!-- Success state -->
            <div id="regSuccess" class="reg-success" style="display:none;">
                <div class="reg-success__circle"><i class="ri-check-line"></i></div>
                <h2>Registration Submitted!</h2>
                <p>Your details have been sent to Mitesh Sir. Once reviewed, you will receive your login credentials to access TuteFlow.</p>
                <button class="btn btn--outline" onclick="showRegForm()">
                    <i class="ri-user-add-line"></i> Register Another Student
                </button>
            </div>

            <!-- Registration form -->
            <form id="regForm">

                <p class="reg-section"><i class="ri-user-3-line"></i> Student Info</p>

                <div class="reg-grid-2">
                    <div class="reg-grid-full">
                        <label class="form__label" for="regName">Full Name <span style="color:var(--danger)">*</span></label>
                        <input type="text" id="regName" class="form__control" required placeholder="e.g. Rahul Sharma">
                    </div>
                    <div>
                        <label class="form__label" for="regPhone">Phone</label>
                        <input type="tel" id="regPhone" class="form__control" placeholder="9876543210">
                    </div>
                    <div>
                        <label class="form__label" for="regEmail">Email</label>
                        <input type="email" id="regEmail" class="form__control" placeholder="rahul@gmail.com">
                    </div>
                </div>

                <p class="reg-section"><i class="ri-parent-line"></i> Parent Info</p>

                <div class="reg-grid-2">
                    <div>
                        <label class="form__label" for="regFatherName">Father's Name</label>
                        <input type="text" id="regFatherName" class="form__control" placeholder="Father's Name">
                    </div>
                    <div>
                        <label class="form__label" for="regMotherName">Mother's Name</label>
                        <input type="text" id="regMotherName" class="form__control" placeholder="Mother's Name">
                    </div>
                    <div>
                        <label class="form__label" for="regFatherPhone">Father's Phone</label>
                        <input type="tel" id="regFatherPhone" class="form__control" placeholder="Father's Phone">
                    </div>
                    <div>
                        <label class="form__label" for="regMotherPhone">Mother's Phone</label>
                        <input type="tel" id="regMotherPhone" class="form__control" placeholder="Mother's Phone">
                    </div>
                </div>

                <p class="reg-section"><i class="ri-book-2-line"></i> Academic Details</p>

                <div class="reg-academic">
                    <div>
                        <label class="form__label" style="margin-bottom:0.4rem;">Grade <span style="color:var(--danger)">*</span></label>
                        <div class="reg-pills" id="regGrade"></div>
                    </div>
                    <div>
                        <label class="form__label" style="margin-bottom:0.4rem;">Subjects</label>
                        <div class="reg-pills">
                            <label class="subject-pill">
                                <input type="checkbox" name="regSubjects" value="Accounts">
                                <span class="subject-pill__label">Accounts</span>
                            </label>
                            <label class="subject-pill">
                                <input type="checkbox" name="regSubjects" value="Commerce">
                                <span class="subject-pill__label">Commerce</span>
                            </label>
                        </div>
                    </div>
                    <div>
                        <label class="form__label" for="regSchool">School</label>
                        <select id="regSchool" class="form__control" style="padding:0.25rem 0.75rem;cursor:pointer;">
                            <option value="" disabled selected>Not set</option>
                            <option value="JNS">JNS</option>
                            <option value="CNMS">CNMS</option>
                            <option value="Podar">Podar</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="btn btn--primary btn--full" id="regSubmitBtn" style="margin-top:1.25rem;">
                    <span id="regSubmitText"><i class="ri-send-plane-line"></i> Submit Registration</span>
                    <span class="spinner" id="regSubmitSpinner" style="display:none;" aria-hidden="true"></span>
                </button>

                <div id="regStatus" class="status" style="display:none;margin-top:0.75rem;"></div>
            </form>
        </div>

        <p class="reg-footer">
            Already have an account? <a href="/login">Log in here</a>
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/utils.js"></script>
    <script src="js/app.js"></script>
    <script src="js/student-register.js"></script>
</body>
</html>
