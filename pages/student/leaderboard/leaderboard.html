<header class="panel__header">
    <h2>Grade Leaderboard</h2>
    <button class="btn btn--outline btn--sm" id="btnRefreshStudentLB">Refresh</button>
</header>

<p id="studentLBStatus" class="status"></p>

<!-- Your rank highlight -->
<div id="myRankCard" class="perf-card" style="margin-bottom:1.5rem; display:none;">
    <div class="perf-card__stat">
        <p class="perf-card__value" id="myRankValue">—</p>
        <p class="perf-card__label" id="myRankLabel">Your Rank</p>
    </div>
    <div class="perf-card__stat">
        <p class="perf-card__value" id="myScoreValue">—</p>
        <p class="perf-card__label">Score</p>
    </div>
    <div class="perf-card__stat">
        <p class="perf-card__value" id="myAvgValue">—</p>
        <p class="perf-card__label">Avg %</p>
    </div>
    <div class="perf-card__stat">
        <p class="perf-card__value" id="myTestsValue">0</p>
        <p class="perf-card__label">Tests Taken</p>
    </div>
</div>

<!-- Class average info -->
<p id="lbClassAvg" style="color:var(--text-muted);font-size:0.85rem;margin-bottom:1rem;"></p>

<div class="table-wrap">
    <table class="data-table" aria-label="Grade leaderboard">
        <thead>
            <tr>
                <th scope="col">Rank</th>
                <th scope="col">Student</th>
                <th scope="col">Score</th>
                <th scope="col">Avg %</th>
                <th scope="col">Tests</th>
            </tr>
        </thead>
        <tbody id="studentLBBody">
            <tr><td colspan="5" class="loading-text">Loading...</td></tr>
        </tbody>
    </table>
</div>
