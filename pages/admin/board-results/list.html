<header class="panel__header">
    <h2>Board Results</h2>
    <div class="tab-pill-selector">
        <button class="tab-pill-selector__btn tab-pill-selector__btn--active" onclick="window.loadPage('page-board_results', '')">Results List</button>
        <button class="tab-pill-selector__btn" onclick="window.loadPage('page-board_results', 'add')">+ Add New</button>
    </div>
</header>

<div id="boardResultsListStatus" class="status"></div>
<div class="table-wrap">
    <table id="boardResultsTable" aria-label="Board results list">
        <thead>
            <tr>
                <th scope="col">Student Name</th>
                <th scope="col">Subject</th>
                <th scope="col">Marks</th>
                <th scope="col">Max Marks</th>
                <th scope="col">Year</th>
                <th scope="col">Action</th>
            </tr>
        </thead>
        <tbody id="boardResultsTableBody">
            <tr><td colspan="6" class="loading-text">Loading board results...</td></tr>
        </tbody>
    </table>
</div>
<div class="text-right">
    <button class="btn btn--primary btn--sm" id="btnRefreshBoardResults">Refresh List</button>
</div>
