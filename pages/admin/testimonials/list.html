<header class="panel__header">
    <h2>Testimonials</h2>
    <div class="tab-pill-selector">
        <button class="tab-pill-selector__btn tab-pill-selector__btn--active" onclick="window.loadPage('page-testimonials', '')">Testimonials List</button>
        <button class="tab-pill-selector__btn" onclick="window.loadPage('page-testimonials', 'add')">+ Add New</button>
    </div>
</header>

<div id="testimonialsListStatus" class="status"></div>
<div class="table-wrap">
    <table id="testimonialsTable" aria-label="Testimonials list">
        <thead>
            <tr>
                <th scope="col">Student Name</th>
                <th scope="col">Subject</th>
                <th scope="col">Year</th>
                <th scope="col">Testimonial Text</th>
                <th scope="col">Media</th>
                <th scope="col">Date Added</th>
                <th scope="col">Action</th>
            </tr>
        </thead>
        <tbody id="testimonialsTableBody">
            <tr><td colspan="7" class="loading-text">Loading testimonials...</td></tr>
        </tbody>
    </table>
</div>
<div class="text-right">
    <button class="btn btn--primary btn--sm" id="btnRefreshTestimonials">Refresh List</button>
</div>
