<header class="panel__header">
    <h2>Upload Resources</h2>
    <div class="tab-pill-selector">
        <button class="tab-pill-selector__btn" onclick="window.loadPage('page-material', '')"><i class="ri-folder-open-line"></i> Resources</button>
        <button class="tab-pill-selector__btn" onclick="window.loadPage('page-material', 'ai-training')"><i class="ri-brain-line"></i> AI Training</button>
        <button class="tab-pill-selector__btn" onclick="window.loadPage('page-material', 'tests')"><i class="ri-file-list-3-line"></i> Tests</button>
        <button class="tab-pill-selector__btn tab-pill-selector__btn--active" onclick="window.loadPage('page-material', 'upload')"><i class="ri-upload-cloud-line"></i> Upload</button>
    </div>
</header>

<form id="uploadForm">
    <div class="form__group">
        <label class="form__label" for="fileTitle">Material Title</label>
        <input type="text" id="fileTitle" class="form__control" required placeholder="e.g. Chapter 4 Notes">
    </div>

    <div class="form__row" style="align-items:flex-start;">
        <div class="form__group form__row-item">
            <label class="form__label">Grade</label>
            <div class="subject-pills" id="fileGrade"></div>
        </div>

        <div class="form__group form__row-item">
            <label class="form__label">Subjects</label>
            <div class="subject-pills">
                <label class="subject-pill">
                    <input type="radio" name="fileSubjects" value="Accounts">
                    <span class="subject-pill__label">Accounts</span>
                </label>
                <label class="subject-pill">
                    <input type="radio" name="fileSubjects" value="Commerce">
                    <span class="subject-pill__label">Commerce</span>
                </label>
            </div>
        </div>

        <div class="form__group form__row-item">
            <label class="form__label">Upload Type</label>
            <div class="subject-pills">
                <label class="subject-pill">
                    <input type="radio" name="uploadType" value="student" checked>
                    <span class="subject-pill__label">Notes</span>
                </label>
                <label class="subject-pill">
                    <input type="radio" name="uploadType" value="ai">
                    <span class="subject-pill__label">AI Training</span>
                </label>
                <label class="subject-pill">
                    <input type="radio" name="uploadType" value="test">
                    <span class="subject-pill__label">Tests</span>
                </label>
            </div>
        </div>
    </div>

    <div class="form__group">
        <div class="form__upload-zone" id="uploadZone">
            <input type="file" id="fileInput" accept=".pdf,.txt,.md" required
                style="position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;">
            <i class="ri-upload-cloud-2-line" style="font-size:2.5rem;color:var(--primary);opacity:0.5;pointer-events:none;"></i>
            <p style="margin:0.25rem 0 0;font-weight:500;color:var(--text-main);pointer-events:none;">Click to browse or drag &amp; drop</p>
            <p class="form__upload-hint" style="pointer-events:none;">PDF, TXT, MD &mdash; Max 50MB</p>
            <p id="selectedFileName" style="display:none;margin:0.25rem 0 0;font-size:0.85rem;color:var(--primary);font-weight:600;pointer-events:none;"></p>
        </div>
    </div>

    <button type="submit" class="btn btn--primary btn--full" id="btnUpload">Upload Material</button>
    <div id="uploadStatus" class="status"></div>
</form>
