<style>
    .bulletin-board {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 1.75rem;
        padding-top: 1.25rem;
    }
    @media (max-width: 600px) { .bulletin-board { grid-template-columns: 1fr; gap: 1rem; } }

    .bulletin-card {
        background: var(--bg-surface);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-lg);
        padding: 1.5rem;
        position: relative;
        box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        transition: var(--transition);
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
    }
    .bulletin-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 10px 24px rgba(0,0,0,0.1);
        border-color: rgba(30,58,95,0.25);
    }
    .bulletin-card__pin {
        position: absolute;
        top: -11px;
        left: 50%;
        transform: translateX(-50%);
        width: 22px;
        height: 22px;
        background: var(--secondary);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 0.7rem;
        box-shadow: 0 2px 6px rgba(176,80,40,0.45);
    }
    .bulletin-card__title {
        font-family: var(--font-heading);
        font-size: 1.15rem;
        font-weight: 700;
        color: var(--primary);
        line-height: 1.3;
        margin: 0.25rem 0 0;
    }
    .bulletin-card__body {
        font-size: 0.875rem;
        color: var(--text-muted);
        line-height: 1.6;
        flex: 1;
        display: -webkit-box;
        -webkit-line-clamp: 4;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }
    .bulletin-card__footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-top: 1px solid var(--glass-border);
        padding-top: 0.65rem;
        margin-top: 0.25rem;
    }
    .bulletin-card__date { font-size: 0.75rem; color: var(--text-muted); }
    .bulletin-empty {
        grid-column: 1 / -1;
        text-align: center;
        padding: 3rem 1rem;
        color: var(--text-muted);
        font-size: 0.95rem;
    }
    .ann-actions { display: flex; justify-content: flex-end; margin-top: 1rem; }
</style>

<header class="panel__header">
    <h2>Announcement Bulletin</h2>
    <div class="tab-pill-selector">
        <button class="tab-pill-selector__btn tab-pill-selector__btn--active" onclick="window.loadPage('page-announcement', '')" style="display:inline-flex;align-items:center;gap:0.35rem;"><i class="ri-megaphone-line"></i> Feed</button>
        <button class="tab-pill-selector__btn" onclick="window.loadPage('page-announcement', 'post')" style="display:inline-flex;align-items:center;gap:0.35rem;"><i class="ri-quill-pen-line"></i> Post</button>
    </div>
</header>

<div id="announcementsListStatus" class="status"></div>
<div id="announcementsList" class="bulletin-board"></div>
<div class="ann-actions">
    <button class="btn btn--outline btn--sm" id="btnRefreshAnnouncements">Refresh</button>
</div>
