<style>
    .rec-card { background:var(--bg-surface); border:1px solid var(--glass-border); border-radius:var(--radius-lg); overflow:hidden; cursor:pointer; transition:transform 0.2s ease,box-shadow 0.2s ease; position:relative; }
    .rec-card:hover { transform:translateY(-4px); box-shadow:0 12px 32px rgba(0,0,0,0.1); }
    .rec-card:focus-visible { outline:2px solid var(--primary); outline-offset:2px; }
    .rec-thumb { position:relative; aspect-ratio:16/9; background:var(--bg-surface-hover); overflow:hidden; }
    .rec-thumb img { width:100%; height:100%; object-fit:cover; display:block; transition:transform 0.3s ease; }
    .rec-card:hover .rec-thumb img { transform:scale(1.04); }
    .rec-play-overlay { position:absolute; inset:0; background:rgba(0,0,0,0.3); display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity 0.2s ease; }
    .rec-card:hover .rec-play-overlay { opacity:1; }
    .rec-play-btn { width:52px; height:52px; background:rgba(255,255,255,0.92); border-radius:50%; display:flex; align-items:center; justify-content:center; transform:scale(0.85); transition:transform 0.2s ease; }
    .rec-card:hover .rec-play-btn { transform:scale(1); }
    .rec-play-btn svg { width:20px; height:20px; fill:var(--primary); margin-left:3px; }
    .rec-count-badge { position:absolute; bottom:0.5rem; right:0.5rem; background:rgba(0,0,0,0.72); color:#fff; font-size:0.72rem; font-weight:600; padding:0.15rem 0.5rem; border-radius:4px; }
    .rec-info { padding:0.9rem 1rem; }
    .rec-title { font-weight:600; color:var(--text-main); font-size:0.9rem; line-height:1.4; margin:0 0 0.3rem; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .rec-meta { font-size:0.76rem; color:var(--text-muted); display:flex; align-items:center; gap:0.4rem; flex-wrap:wrap; }
    .rec-pl-thumb { position:relative; aspect-ratio:16/9; background:var(--bg-surface-hover); overflow:hidden; }
    .rec-pl-thumb .rec-pl-main { width:100%; height:100%; object-fit:cover; display:block; transition:transform 0.3s ease; }
    .rec-card:hover .rec-pl-main { transform:scale(1.04); }
    .rec-pl-strip { position:absolute; top:0; right:0; bottom:0; width:30%; display:flex; flex-direction:column; gap:2px; background:var(--bg-surface-hover); }
    .rec-pl-strip img { width:100%; flex:1; object-fit:cover; display:block; }
    .rec-pl-empty { width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:0.5rem; color:var(--text-muted); }
    .rec-pl-empty svg { width:32px; height:32px; opacity:0.3; }
    .rec-pl-empty span { font-size:0.78rem; }
    .rec-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:1.25rem; }
    .rec-empty { text-align:center; padding:3.5rem 1rem; color:var(--text-muted); }
    .rec-empty svg { width:56px; height:56px; margin:0 auto 1rem; opacity:0.2; display:block; color:var(--primary); }
    .rec-empty h4 { font-size:1rem; color:var(--text-main); margin:0 0 0.4rem; }
    .rec-empty p { font-size:0.85rem; max-width:320px; margin:0 auto 1.25rem; line-height:1.6; }
</style>

<header class="panel__header">
    <h2>Class Recordings</h2>
    <div style="display:flex;align-items:center;gap:1rem;">
        <button class="btn btn--outline btn--sm" id="btnRenewWatch" style="display:none;"><i class="ri-loop-left-line"></i> Renew Watch</button>
        <div class="tab-pill-selector">
            <button class="tab-pill-selector__btn tab-pill-selector__btn--active">Playlists</button>
            <button class="tab-pill-selector__btn" id="btnNewPlaylist" onclick="window.loadPage('page-recordings','create')">+ New Playlist</button>
        </div>
    </div>
</header>

<div id="recordingsStatus" class="status" style="display:none;margin-bottom:1rem;"></div>

<div id="recPlaylistGrid" class="rec-grid"></div>
<div id="recPlaylistEmpty" class="rec-empty" style="display:none;">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 12h16.5m-16.5 3.75h16.5M3.75 19.5h16.5M5.625 4.5h12.75a1.875 1.875 0 010 3.75H5.625a1.875 1.875 0 010-3.75z"/></svg>
    <h4>No playlists yet</h4>
    <p>Create your first playlist to organise class recordings by topic or chapter.</p>
    <button class="btn btn--primary btn--sm" id="btnEmptyNewPlaylist" style="display:none;"><i class="ri-add-line"></i> New Playlist</button>
</div>
