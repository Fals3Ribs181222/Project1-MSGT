<header class="panel__header">
    <div>
        <h2 id="testTitle">Loading Test...</h2>
        <p id="testMeta" class="breadcrumb__meta" style="margin-top:0.25rem;">Fetching test details...</p>
    </div>
    <button class="btn btn--outline btn--sm" onclick="window.loadPage('page-test', 'list')">← Back to Tests</button>
</header>

<!-- Performance Summary Cards -->
<div class="stat-grid" id="performanceGrid" aria-label="Performance summary" style="margin-top:1.5rem;">
    <article class="stat-card">
        <p class="stat-card__label">Class Average</p>
        <p class="stat-card__value" id="statAverage">-</p>
    </article>
    <article class="stat-card">
        <p class="stat-card__label">Highest Score</p>
        <p class="stat-card__value" id="statHighest">-</p>
    </article>
    <article class="stat-card">
        <p class="stat-card__label">Lowest Score</p>
        <p class="stat-card__value" id="statLowest">-</p>
    </article>
    <article class="stat-card" id="btnOpenLeaderboard" role="button" tabindex="0" title="View test leaderboard" style="cursor:pointer;transition:var(--transition);border:2px solid transparent;">
        <p class="stat-card__label">Leaderboard</p>
        <p class="stat-card__value" style="font-size:1.75rem;line-height:1;"><i class="ri-trophy-fill" aria-hidden="true"></i></p>
    </article>
</div>

<div style="margin-top:1.5rem;">
    <div id="marksTableContainer" hidden>
        <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:0.5rem;">
            <input type="text" id="marksSearch" class="form__control" placeholder="Search student..." style="max-width:220px;">
<span id="marksProgress" style="font-size:0.85rem;font-weight:600;color:var(--primary);"></span>
            <div style="margin-left:auto;display:flex;align-items:center;gap:0.6rem;flex-shrink:0;" id="marksStickyBar">
                <button type="button" class="btn btn--whatsapp btn--sm" id="btnSendMarks" style="display:none;">
                    <i class="ri-whatsapp-line" aria-hidden="true"></i> Send Marks (0)
                </button>
                <button type="button" class="btn btn--whatsapp btn--sm" id="btnSendNotAttempted" style="display:none;">
                    <i class="ri-whatsapp-line" aria-hidden="true"></i> Send Not Attempted (0)
                </button>
                <button form="marksForm" type="submit" class="btn btn--primary btn--sm" id="btnSaveMarks">Save All Marks</button>
            </div>
        </div>
        <div id="marksStickyStatus" style="display:flex;gap:0.5rem;flex-wrap:wrap;align-items:center;min-height:1.5rem;margin-bottom:0.75rem;">
            <div id="marksStatus" class="status" style="margin:0;"></div>
            <div id="sendMarksStatus" class="status" style="display:none;margin:0;"></div>
            <div id="sendNotAttemptedStatus" class="status" style="display:none;margin:0;"></div>
        </div>
        <form id="marksForm">
            <div id="marksGrid" class="marks-grid"></div>
        </form>
    </div>

    <div id="loadingState" class="loading-text">
        Loading students and existing marks...
    </div>
</div>
