<header class="panel__header">
    <h2>Test List</h2>
    <div class="tab-pill-selector">
        <button class="tab-pill-selector__btn tab-pill-selector__btn--active" onclick="window.loadPage('page-test', '')"><i class="ri-file-list-3-line"></i> List</button>
        <button class="tab-pill-selector__btn" onclick="window.loadPage('page-test', 'assign')"><i class="ri-edit-line"></i> Assign</button>
    </div>
</header>

<div id="testsListStatus" class="status"></div>

<div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:1rem;flex-wrap:wrap;">
    <div style="position:relative;flex:1;min-width:180px;">
        <i class="ri-search-line" style="position:absolute;left:0.75rem;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none;font-size:1rem;"></i>
        <input type="search" id="testsSearch" class="form__control" placeholder="Search by title or subject…" style="padding-left:2.25rem;margin:0;">
    </div>
    <span id="testsCount" style="font-size:0.85rem;color:var(--text-muted);white-space:nowrap;"></span>
    <button class="btn btn--outline btn--sm" id="btnRefreshTestsList" style="white-space:nowrap;display:inline-flex;align-items:center;gap:0.35rem;">
        <i class="ri-refresh-line"></i> Refresh
    </button>
</div>

<div id="testsCardsContainer" class="test-cards">
    <p class="loading-text">Loading tests...</p>
</div>
