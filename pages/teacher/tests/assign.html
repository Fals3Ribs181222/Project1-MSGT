<header class="panel__header">
    <h2>Assign Tests</h2>
    <div class="tab-pill-selector">
        <button class="tab-pill-selector__btn" onclick="window.loadPage('page-test', '')"><i class="ri-file-list-3-line"></i> List</button>
        <button class="tab-pill-selector__btn tab-pill-selector__btn--active" onclick="window.loadPage('page-test', 'assign')"><i class="ri-edit-line"></i> Assign</button>
    </div>
</header>

<form id="testForm">
    <div class="form__group">
        <div class="form__row">
            <div class="form__row-item">
                <label class="form__label" for="testTitle">Test Title</label>
                <input type="text" id="testTitle" class="form__control" required placeholder="e.g. Midterm Exam">
            </div>
            <div class="form__row-item" style="max-width:160px;">
                <label class="form__label" for="testMaxMarks">Max Marks</label>
                <input type="number" id="testMaxMarks" class="form__control" required min="1" placeholder="e.g. 100">
            </div>
        </div>
    </div>

    <div class="form__group">
        <div class="form__row">
            <div class="form__row-item">
                <label class="form__label">Grade</label>
                <div class="subject-pills" id="schedTestGrade"></div>
            </div>
            <div class="form__row-item">
                <label class="form__label">Subjects</label>
                <div class="subject-pills">
                    <label class="subject-pill">
                        <input type="checkbox" name="testSubjects" value="Accounts">
                        <span class="subject-pill__label">Accounts</span>
                    </label>
                    <label class="subject-pill">
                        <input type="checkbox" name="testSubjects" value="Commerce">
                        <span class="subject-pill__label">Commerce</span>
                    </label>
                </div>
            </div>
            <div class="form__row-item">
                <label class="form__label">School</label>
                <div class="subject-pills">
                    <label class="subject-pill">
                        <input type="checkbox" name="testSchool" value="JNS">
                        <span class="subject-pill__label">JNS</span>
                    </label>
                    <label class="subject-pill">
                        <input type="checkbox" name="testSchool" value="CNMS">
                        <span class="subject-pill__label">CNMS</span>
                    </label>
                    <label class="subject-pill">
                        <input type="checkbox" name="testSchool" value="Podar">
                        <span class="subject-pill__label">Podar</span>
                    </label>
                </div>
            </div>
        </div>
    </div>

    <div class="form__group">
        <label class="form__label">Test Dates</label>
        <div id="testDatePicker" class="date-picker"></div>
        <div id="testDateChips" class="date-chips"></div>
    </div>

    <button type="submit" class="btn btn--primary btn--full" id="btnScheduleTest">Schedule Test</button>
    <div id="testStatus" class="status"></div>
</form>
