<header class="panel__header" style="margin-bottom:2rem;">
    <h2>AI Tools</h2>
    <div class="tab-pill-selector">
        <button class="tab-pill-selector__btn tab-pill-selector__btn--active icon-inline" onclick="window.loadPage('page-ai-tools', '')"><i class="ri-question-line" aria-hidden="true"></i> Doubt Solver</button>
        <button class="tab-pill-selector__btn icon-inline" onclick="window.loadPage('page-ai-tools', 'test-generator')"><i class="ri-file-text-line" aria-hidden="true"></i> Test Generator</button>
    </div>
</header>

<div style="margin-bottom:1.5rem;">
    <p style="color:var(--text-muted);font-size:0.9rem;line-height:1.6;">
        Ask a subject question — the AI answers using uploaded study materials only.
    </p>
</div>

<div class="form__row" style="margin-bottom:1rem;">
    <div class="form__row-item">
        <label class="form__label">Subject</label>
        <select id="doubtSubject" class="form__control">
            <option value="">Select subject</option>
            <option value="Accounts">Accounts</option>
            <option value="Commerce">Commerce</option>
        </select>
    </div>
    <div class="form__row-item">
        <label class="form__label">Grade</label>
        <div class="subject-pills" id="doubtGrade"></div>
    </div>
</div>

<div class="form__group">
    <label class="form__label">Your Question</label>
    <textarea id="doubtQuestion" class="form__control" rows="3"
        placeholder="e.g. What is the difference between trading account and profit &amp; loss account?"></textarea>
</div>

<button class="btn btn--primary" id="btnAskDoubt">✨ Ask AI</button>
<div id="doubtStatus" class="status"></div>

<div id="doubtAnswerBox" style="display:none;margin-top:1.5rem;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem;">
        <h4 style="color:var(--primary);margin:0;">AI Answer</h4>
        <div style="display:flex;gap:0.5rem;align-items:center;">
            <button class="btn btn--outline btn--sm" id="btnCopyDoubt">Copy</button>
            <button class="btn btn--outline btn--sm" id="btnFeedbackUp" title="Helpful" style="padding:0.4rem 0.6rem;font-size:1rem;">👍</button>
            <button class="btn btn--outline btn--sm" id="btnFeedbackDown" title="Not helpful" style="padding:0.4rem 0.6rem;font-size:1rem;">👎</button>
        </div>
    </div>
    <div id="doubtSources" style="display:none;margin-bottom:0.75rem;">
        <span style="font-size:0.8rem;color:var(--text-muted);">Sources: </span>
        <span id="doubtSourcesList" style="font-size:0.8rem;color:var(--primary);font-weight:500;"></span>
    </div>
    <div id="doubtAnswer" style="
        background:var(--glass-bg);
        border:1px solid var(--glass-border);
        border-radius:var(--radius-md);
        padding:1.25rem;
        color:var(--text-main);
        font-size:0.95rem;
        line-height:1.7;
    "></div>
</div>

<div id="doubtSuggestions" style="display:none;margin-top:1rem;">
    <p style="font-size:0.85rem;color:var(--text-muted);margin-bottom:0.5rem;">Related questions:</p>
    <div id="doubtSuggestionBtns" style="display:flex;flex-wrap:wrap;gap:0.5rem;"></div>
</div>
