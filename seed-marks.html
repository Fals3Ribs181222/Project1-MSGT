<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seed Trial Marks</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            max-width: 700px;
            margin: 3rem auto;
            padding: 0 1.5rem;
            background: #f5f5f5;
            color: #2d3748;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 0.25rem;
        }

        p.sub {
            color: #666;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        button {
            background: #8e44ad;
            color: white;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            margin-bottom: 1.5rem;
        }

        button:disabled {
            background: #aaa;
            cursor: not-allowed;
        }

        .log {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 1rem 1.25rem;
            font-size: 0.875rem;
            line-height: 2;
            min-height: 100px;
            max-height: 400px;
            overflow-y: auto;
        }

        .ok {
            color: #2d7a2d;
        }

        .err {
            color: #c0392b;
        }

        .info {
            color: #8e44ad;
            font-weight: 600;
        }

        #progress {
            margin-bottom: 0.75rem;
            font-weight: 600;
            color: #444;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        select {
            padding: 0.75rem 1rem;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 1rem;
            background: white;
            color: #2d3748;
            cursor: pointer;
        }

        .controls button {
            margin-bottom: 0;
        }
    </style>
</head>

<body>

    <h1>💯 Seed Trial Marks</h1>
    <p class="sub">
        Randomly generates marks for all students across all dummy tests (Test 1 - Test 15).<br>
        <strong>You must be logged in as the teacher and have already run the student and test seeders.</strong>
    </p>

    <div class="controls">
        <select id="gradeSelect">
            <option value="12th" selected>Grade 12th</option>
            <option value="11th">Grade 11th</option>
        </select>
        <button id="btnRun" onclick="runSeed()">Assign Marks</button>
    </div>
    <div id="progress"></div>
    <div class="log" id="log">Waiting to start...</div>

    <script>
        // ── Config ────────────────────────────────────────────────────────────────────
        const SUPABASE_URL = 'https://tksruuqtzxflgglnljef.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrc3J1dXF0enhmbGdnbG5samVmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNzY0OTIsImV4cCI6MjA4Nzk1MjQ5Mn0.eu6LwoP-9O5sG9nHhBza0UgYHCOm7Ni5flk_1Lgl4FU';

        const { createClient } = supabase;
        const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ── Helpers ───────────────────────────────────────────────────────────────────
        function log(msg, type = '') {
            const div = document.getElementById('log');
            const line = document.createElement('div');
            line.className = type;
            line.textContent = msg;
            div.appendChild(line);
            div.scrollTop = div.scrollHeight;
        }

        function setProgress(current, total, prefix = 'Processing') {
            document.getElementById('progress').textContent =
                current < total ? `${prefix} test ${current} of ${total}...` : `✅ Done — Marks assigned for ${total} tests.`;
        }

        // ── Main Seed Function ────────────────────────────────────────────────────────
        async function runSeed() {
            const btn = document.getElementById('btnRun');
            btn.disabled = true;
            document.getElementById('log').innerHTML = '';

            const selectedGrade = document.getElementById('gradeSelect').value;

            // 1. Check the teacher is logged in
            const { data: sessionData } = await client.auth.getSession();
            const teacherSession = sessionData?.session;

            if (!teacherSession) {
                log('⚠️  Not logged in. Please log into the teacher dashboard first, then reopen this file.', 'err');
                btn.disabled = false;
                return;
            }

            log(`Logged in as teacher. Assigning marks for grade ${selectedGrade}...`, 'info');

            // 2. Fetch Dummy Tests for this grade
            log(`Fetching existing ${selectedGrade} dummy tests...`, 'info');
            const { data: tests, error: testError } = await client
                .from('tests')
                .select('id, title, max_marks')
                .ilike('title', 'Test %')
                .eq('grade', selectedGrade);

            if (testError || !tests || tests.length === 0) {
                log(`✗ No ${selectedGrade} dummy tests found. Have you run seed-tests.html for this grade?`, 'err');
                btn.disabled = false;
                return;
            }
            log(`Found ${tests.length} dummy tests.`, 'info');

            // 3. Fetch Dummy Students for this grade
            log(`Fetching existing ${selectedGrade} dummy students...`, 'info');
            const { data: students, error: studentError } = await client
                .from('profiles')
                .select('id, name')
                .eq('role', 'student')
                .eq('grade', selectedGrade);

            if (studentError || !students || students.length === 0) {
                log(`✗ No ${selectedGrade} dummy students found. Have you run seed-students.html for this grade?`, 'err');
                btn.disabled = false;
                return;
            }
            log(`Found ${students.length} dummy students.`, 'info');

            // 4. Delete existing marks for these tests to allow clean re-runs
            log('Clearing existing marks for these tests...', 'info');
            const testIds = tests.map(t => t.id);
            const { error: delError } = await client
                .from('marks')
                .delete()
                .in('test_id', testIds);
            if (delError) {
                log(`⚠ Warning: Failed to clear old marks: ${delError.message}`, 'err');
            }

            let successCount = 0;
            let failCount = 0;

            log('Starting mark assignment...', 'info');

            // For each test, we'll assign a mark for every single student.
            // We send them in bulk (upsert/insert array) per test.
            for (let i = 0; i < tests.length; i++) {
                const test = tests[i];
                setProgress(i + 1, tests.length, 'Assigning marks for');

                const marksToInsert = students.map(student => {
                    // Generate a random score between 50% and 100% of max_marks
                    const maxMarks = test.max_marks || 50;
                    const minMarks = Math.floor(maxMarks * 0.5);
                    const randomScore = Math.floor(Math.random() * (maxMarks - minMarks + 1)) + minMarks;

                    return {
                        test_id: test.id,
                        student_id: student.id,
                        marks_obtained: randomScore
                    };
                });

                try {
                    const { error } = await client.from('marks').insert(marksToInsert);

                    if (error) {
                        log(`✗  Failed to assign marks for ${test.title} — ${error.message}`, 'err');
                        failCount++;
                    } else {
                        log(`✓  Assigned random marks to ${marksToInsert.length} students for ${test.title}`, 'ok');
                        successCount++;
                    }
                } catch (err) {
                    log(`✗  Unexpected error on ${test.title}: ${err.message}`, 'err');
                    failCount++;
                }

                // Small delay to avoid hitting Supabase rate limits
                await new Promise(r => setTimeout(r, 400));
            }

            setProgress(tests.length, tests.length, 'Processing');
            log('─────────────────────────────────────', 'info');
            log(`Completed: ${successCount} tests seeded. Failed: ${failCount}`, 'info');

            btn.disabled = false;
            btn.textContent = 'Run Again';
        }
    </script>

</body>

</html>
