<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seed Phone Numbers - TuteFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 2rem;
            background: var(--bg-primary);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
        }

        .log-box {
            background: var(--bg-secondary);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            padding: 1rem;
            height: 400px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.9rem;
            line-height: 1.5;
            color: var(--text-secondary);
            margin-top: 1.5rem;
        }

        .log-entry {
            margin-bottom: 0.25rem;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            padding-bottom: 0.25rem;
        }

        .log-success {
            color: #10b981;
        }

        .log-error {
            color: #ef4444;
        }

        .log-info {
            color: #3b82f6;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1 style="font-size: 1.5rem; margin-bottom: 0.5rem; color: var(--text-primary);">Update Student Phone Numbers
        </h1>
        <p style="color: var(--text-secondary); margin-bottom: 1.5rem;">Updates all student profiles to use phone
            number: <strong>9769767219</strong></p>

        <button id="btnStart" class="btn btn--primary" onclick="startUpdate()">
            <i class="ri-play-fill"></i> Start Update
        </button>

        <div id="logBox" class="log-box">
            <div class="log-entry log-info">System initialized. Waiting to start...</div>
        </div>
    </div>

    <script src="../js/app.js"></script>
    <script>
        const logBox = document.getElementById('logBox');
        const btnStart = document.getElementById('btnStart');

        function log(message, type = 'info') {
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logBox.appendChild(entry);
            logBox.scrollTop = logBox.scrollHeight;
        }

        async function startUpdate() {
            btnStart.disabled = true;
            btnStart.innerHTML = '<i class="ri-loader-4-line ri-spin"></i> Updating...';

            try {
                // 1. Verify Teacher Session
                const { data: sessionData, error: sessionError } = await window.supabaseClient.auth.getSession();
                if (sessionError || !sessionData.session) {
                    throw new Error("No active teacher session found. Please log in first.");
                }
                log("Teacher authenticated.", "success");

                // 2. Fetch all dummy students
                log("Fetching students...");
                const { data: students, error: fetchError } = await window.supabaseClient
                    .from('profiles')
                    .select('id, name, phone')
                    .eq('role', 'student');

                if (fetchError) throw new Error("Failed to fetch students: " + fetchError.message);

                log(`Found ${students.length} students to update.`, "info");

                // 3. Update phones one by one to avoid rate limits
                let successCount = 0;
                let failCount = 0;
                const newPhone = '9769767219';

                for (let i = 0; i < students.length; i++) {
                    const student = students[i];
                    log(`Updating ${student.name}...`, "info");

                    const { error: updateError } = await window.supabaseClient
                        .from('profiles')
                        .update({ phone: newPhone })
                        .eq('id', student.id);

                    if (updateError) {
                        log(`Failed to update ${student.name}: ${updateError.message}`, "error");
                        failCount++;
                    } else {
                        successCount++;
                    }

                    // Small delay to prevent API throttling
                    await new Promise(r => setTimeout(r, 200));
                }

                log(`Update Complete! Successfully updated ${successCount} students. Failed: ${failCount}.`, "success");

            } catch (err) {
                log(err.message, "error");
            } finally {
                btnStart.innerHTML = '<i class="ri-check-line"></i> Finished';
            }
        }
    </script>
</body>

</html>
