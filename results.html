<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results | Mitesh Sir's Group Tutions</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css?v=light">
    <style>
        .filter-bar {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 1.5rem 2rem;
            backdrop-filter: blur(16px);
            margin-bottom: 2rem;
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .filter-bar select,
        .filter-bar input {
            background: var(--bg-surface-hover);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 0.5rem 1rem;
            border-radius: var(--radius-md);
            font-family: inherit;
        }

        .filter-bar select:focus,
        .filter-bar input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .results-table-wrapper {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            overflow-x: auto;
            backdrop-filter: blur(16px);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th,
        td {
            padding: 1.25rem;
            border-bottom: 1px solid var(--glass-border);
        }

        th {
            font-weight: 600;
            color: var(--primary);
            white-space: nowrap;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tbody tr {
            transition: var(--transition);
        }

        tbody tr:hover {
            background: rgba(0, 0, 0, 0.03);
        }

        .rank-badge {
            display: inline-block;
            background: rgba(236, 72, 153, 0.15);
            color: var(--secondary);
            font-weight: 700;
            padding: 0.25rem 0.75rem;
            border-radius: var(--radius-full);
            border: 1px solid rgba(236, 72, 153, 0.3);
        }

        .score-highlight {
            font-weight: 700;
            color: var(--text-main);
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }
    </style>
</head>

<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="nav-logo">Mitesh Sir's Tutions</a>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="testimonials.html" class="nav-link">Testimonials</a>
                <a href="results.html" class="nav-link active">Results</a>
                <a href="login.html" class="nav-link">Student Login</a>
                <a href="login.html?role=teacher" class="nav-link">Teacher Login</a>
            </div>
        </div>
    </nav>

    <main class="container section">
        <div class="section-header">
            <h1 class="section-title">Outstanding Results</h1>
            <p>We are proud of our students' achievements. Browse through our top performers.</p>
        </div>

        <div class="filter-bar">
            <div class="filter-group">
                <label for="filterSubject">Subject:</label>
                <select id="filterSubject">
                    <option value="">All Subjects</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="filterYear">Year:</label>
                <select id="filterYear">
                    <option value="">All Years</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="searchName">Search:</label>
                <input type="text" id="searchName" placeholder="Student name...">
            </div>
        </div>

        <div class="results-table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Student Name</th>
                        <th>Subject</th>
                        <th>Marks</th>
                        <th>Overall</th>
                        <th>Year</th>
                    </tr>
                </thead>
                <tbody id="resultsBody">
                    <tr>
                        <td colspan="5" class="empty-state" id="loadingMsg">Loading results...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <footer class="footer">
        <div class="container text-center text-muted pt-4 pb-4">
            <p>&copy; 2026 Mitesh Sir's Group Tutions. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
    <script>
        let allResults = [];

        document.addEventListener('DOMContentLoaded', () => {
            loadResults();

            document.getElementById('filterSubject').addEventListener('change', renderResults);
            document.getElementById('filterYear').addEventListener('change', renderResults);
            document.getElementById('searchName').addEventListener('input', renderResults);
        });

        async function loadResults() {
            if (CONFIG.SCRIPT_URL === 'YOUR_WEB_APP_URL_HERE') {
                document.getElementById('loadingMsg').textContent = 'Please configure the Google Apps Script Web App URL.';
                return;
            }

            const response = await api.get('getResults');

            if (response.success) {
                allResults = response.data;
                populateFilters();
                renderResults();
            } else {
                document.getElementById('loadingMsg').textContent = 'Error loading results: ' + (response.error || 'Unknown error');
                document.getElementById('loadingMsg').style.color = 'red';
            }
        }

        function populateFilters() {
            const subjects = new Set();
            const years = new Set();

            allResults.forEach(item => {
                if (item['Subject']) subjects.add(item['Subject']);
                if (item['Year']) years.add(item['Year']);
            });

            const subjSelect = document.getElementById('filterSubject');
            subjects.forEach(subject => {
                subjSelect.appendChild(createElement('option', '', subject)).value = subject;
            });

            const yearSelect = document.getElementById('filterYear');
            years.forEach(yr => {
                yearSelect.appendChild(createElement('option', '', yr)).value = yr;
            });
        }

        function renderResults() {
            const tbody = document.getElementById('resultsBody');
            const subjectFilter = document.getElementById('filterSubject').value;
            const yearFilter = document.getElementById('filterYear').value;
            const searchFilter = document.getElementById('searchName').value.toLowerCase();

            let filtered = allResults.filter(item => {
                const matchSubj = subjectFilter === "" || item['Subject'] === subjectFilter;
                const matchYear = yearFilter === "" || String(item['Year']) === String(yearFilter);
                const matchName = searchFilter === "" || String(item['Student Name']).toLowerCase().includes(searchFilter);
                return matchSubj && matchYear && matchName;
            });

            // Sort by Marks
            filtered.sort((a, b) => {
                const marksA = parseFloat(a['Marks']) || 0;
                const marksB = parseFloat(b['Marks']) || 0;
                return marksB - marksA; // Descending order
            });

            tbody.innerHTML = '';

            if (filtered.length === 0) {
                const tr = createElement('tr');
                const td = createElement('td', 'empty-state', 'No results found matching your criteria.');
                td.colSpan = 5;
                tr.appendChild(td);
                tbody.appendChild(tr);
                return;
            }

            filtered.forEach(item => {
                const tr = createElement('tr');

                tr.appendChild(createElement('td', '', item['Student Name'] || '-'));
                tr.appendChild(createElement('td', '', item['Subject'] || '-'));
                tr.appendChild(createElement('td', 'score-highlight', item['Marks'] || '-'));
                tr.appendChild(createElement('td', '', item['Overall'] || '-'));
                tr.appendChild(createElement('td', '', item['Year'] || '-'));

                tbody.appendChild(tr);
            });
        }
    </script>
</body>

</html>
