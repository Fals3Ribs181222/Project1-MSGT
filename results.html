<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="View outstanding academic results achieved by students at Mitesh Sir's Group Tuitions.">
    <title>Results | Mitesh Sir's Group Tuitions</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <!-- Navigation -->
    <nav class="navbar" aria-label="Main navigation">
        <div class="navbar__container" style="padding: 0 2rem;">
            <button class="navbar__toggle" aria-label="Toggle navigation" aria-expanded="false">☰</button>
            <a href="index" class="navbar__logo">Mitesh Sir's Group Tuitions</a>
            <ul class="navbar__links" style="background:none;border:none;padding:0;gap:0.25rem;">
                <li><a href="index" class="navbar__link">Home</a></li>
                <li><a href="testimonials" class="navbar__link">Testimonials</a></li>
                <li><a href="results" class="navbar__link navbar__link--active">Results</a></li>
                <li><a href="login" class="navbar__link">Login</a></li>
            </ul>
        </div>
    </nav>

    <main class="container section">
        <header class="section__header">
            <h1 class="section__title">Outstanding Results</h1>
            <p>We are proud of our students' achievements. Browse through our top performers.</p>
        </header>

        <div class="filter-bar" role="search" aria-label="Filter results">
            <div class="filter-bar__group">
                <label for="filterSubject">Subject:</label>
                <select id="filterSubject" class="filter-bar__control">
                    <option value="">All Subjects</option>
                </select>
            </div>
            <div class="filter-bar__group">
                <label for="filterYear">Year:</label>
                <select id="filterYear" class="filter-bar__control">
                    <option value="">All Years</option>
                </select>
            </div>
            <div class="filter-bar__group">
                <label for="searchName">Search:</label>
                <input type="search" id="searchName" class="filter-bar__control" placeholder="Student name...">
            </div>
        </div>

        <div class="data-table">
            <table aria-label="Student results">
                <thead>
                    <tr>
                        <th scope="col">Student Name</th>
                        <th scope="col">Subject</th>
                        <th scope="col">Marks</th>
                        <th scope="col">Overall</th>
                        <th scope="col">Year</th>
                    </tr>
                </thead>
                <tbody id="resultsBody">
                    <tr>
                        <td colspan="5" class="empty-state" id="loadingMsg">Loading results...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer__bottom">
                <p>&copy; 2026 Mitesh Sir's Group Tuitions. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/utils.js"></script>
    <script src="js/app.js"></script>
    <script src="js/results.js"></script>
</body>

</html>
