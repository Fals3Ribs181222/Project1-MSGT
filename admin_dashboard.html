<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="description" content="Admin Panel — Developer control panel for TuteFlow.">
    <title>Admin Panel | Mitesh Sir's Study Circle</title>
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Mitesh Bhatt" />
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <script defer src="/_vercel/insights/script.js"></script>
</head>

<body class="is-home-active">
    <nav class="navbar" aria-label="Main navigation">
        <div class="navbar__container" style="padding: 0 2rem;">
            <a href="index" class="navbar__logo"><img src="logo.png" alt="Mitesh Sir's Study Circle" style="height:70px;width:auto;display:block;"><span style="font-size:1rem;font-weight:700;color:var(--text-primary,#1a1a2e);white-space:nowrap;">Mitesh Sir's Study Circle</span></a>
            <ul class="navbar__links" style="background:none;border:none;padding:0;gap:0.25rem;">
                <li><a href="index" class="navbar__link">Home</a></li>
                <li><a href="testimonials" class="navbar__link">Testimonials</a></li>
                <li><a href="results" class="navbar__link">Results</a></li>
                <li><button class="btn btn--outline btn--sm" id="btnLogout" style="margin-left:0.5rem;">⏻ Logout</button></li>
            </ul>
        </div>
    </nav>

    <main class="container section">
        <header class="welcome">
            <h1>Admin Panel — <span class="welcome__name" id="adminName">Admin</span></h1>
            <p class="welcome__sub">Developer Control Panel — Feature flags, user management, and data operations.</p>
        </header>

        <div class="panels-container" id="dashboard-content">

            <!-- Home Panel -->
            <section class="panel tabs__panel tabs__panel--active" id="panel-home" role="tabpanel" aria-label="Home">
                <header class="panel__header" style="margin-bottom: 2rem;">
                    <h2>Admin Overview</h2>
                </header>
                <div class="landing-grid">
                    <button class="landing-pill" data-target="panel-admin-overview">
                        <span class="landing-pill__icon">📊</span>
                        <span class="landing-pill__text">Overview</span>
                    </button>
                    <button class="landing-pill" data-target="panel-admin-flags">
                        <span class="landing-pill__icon">🔧</span>
                        <span class="landing-pill__text">Feature Flags</span>
                    </button>
                    <button class="landing-pill" data-target="panel-admin-users">
                        <span class="landing-pill__icon">👥</span>
                        <span class="landing-pill__text">Users</span>
                    </button>
                    <button class="landing-pill" data-target="panel-admin-bulk">
                        <span class="landing-pill__icon">🗑️</span>
                        <span class="landing-pill__text">Bulk Ops</span>
                    </button>
                    <button class="landing-pill" data-target="panel-admin-browse">
                        <span class="landing-pill__icon">🗄️</span>
                        <span class="landing-pill__text">Table Browser</span>
                    </button>
                </div>
            </section>
            <!-- Dynamic Tabs loaded by router.js -->

        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer__bottom">
                <p>&copy; 2026 Mitesh Sir's Study Circle. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/app.js"></script>
    <script type="module">
        import { loadTab, initRouter } from "./js/dashboard/router.js";
        window.loadTab = loadTab;
        initRouter('panel-admin-overview');
    </script>
    <script>
        (async () => {
            const user = await window.auth.requireRole('admin');
            if (!user) return;
            document.getElementById('adminName').textContent = user.name;
            document.getElementById('btnLogout').addEventListener('click', () => window.auth.logout());
        })();
    </script>
</body>

</html>
