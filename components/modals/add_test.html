<form id="testForm">
    <div class="form__group">
        <label class="form__label" for="testTitle">Test Title</label>
        <input type="text" id="testTitle" class="form__control" required placeholder="e.g. Midterm Exam">
    </div>

    <div class="form__group">
        <label class="form__label" for="schedTestGrade">Grade</label>
        <select id="schedTestGrade" class="form__control" required></select>
    </div>

    <div class="form__group">
        <label class="form__label">Subjects</label>
        <div class="subject-pills">
            <label class="subject-pill">
                <input type="checkbox" name="testSubjects" value="Accounts">
                <span class="subject-pill__label">Accounts</span>
            </label>
            <label class="subject-pill">
                <input type="checkbox" name="testSubjects" value="Commerce">
                <span class="subject-pill__label">Commerce</span>
            </label>
        </div>
    </div>

    <div class="form__group form__row">
        <div class="form__row-item">
            <label class="form__label" for="testDate">Date</label>
            <input type="date" id="testDate" class="form__control" required>
        </div>
        <div class="form__row-item">
            <label class="form__label" for="testMaxMarks">Max Marks</label>
            <input type="number" id="testMaxMarks" class="form__control" required min="1">
        </div>
    </div>

    <button type="submit" class="btn btn--primary btn--full" id="btnScheduleTest">Schedule Test</button>
    <div id="testStatus" class="status"></div>
</form>
