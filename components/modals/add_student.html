<div style="margin-bottom:1.5rem;">
    <h3 style="margin-bottom:0.5rem;">Register New Student</h3>
    <p style="color:var(--text-muted);font-size:0.9rem;line-height:1.6;margin:0;">Fill out the details below to create a student account. Username and password are auto-generated from the student's name — edit if needed.</p>
</div>

<form id="addStudentForm" style="max-width:520px;">
    <div class="form__group">
        <label class="form__label" for="studentName">Student Full Name</label>
        <input type="text" id="studentName" class="form__control" required placeholder="e.g. Rahul Sharma">
    </div>

    <div class="form__group">
        <label class="form__label" for="studentGrade">Grade</label>
        <select id="studentGrade" class="form__control" required></select>
    </div>

    <div class="form__group">
        <label class="form__label">Subjects</label>
        <div class="subject-pills">
            <label class="subject-pill">
                <input type="checkbox" name="studentSubjects" value="Accounts">
                <span class="subject-pill__label">Accounts</span>
            </label>
            <label class="subject-pill">
                <input type="checkbox" name="studentSubjects" value="Commerce">
                <span class="subject-pill__label">Commerce</span>
            </label>
        </div>
    </div>

    <div class="form__group">
        <label class="form__label" for="studentUsername">Username</label>
        <input type="text" id="studentUsername" class="form__control" required placeholder="e.g. rahul.sharma">
    </div>

    <div class="form__group">
        <label class="form__label" for="studentPassword">Password</label>
        <input type="text" id="studentPassword" class="form__control" required placeholder="Auto-filled from name"
            minlength="6">
    </div>

    <div class="form__group">
        <label class="form__label" for="studentPhone">Student Phone (WhatsApp)</label>
        <input type="tel" id="studentPhone" class="form__control" placeholder="e.g. 9876543210">
        <small class="form__help">10-digit number without +91</small>
    </div>

    <div class="form__group">
        <label class="form__label" for="studentEmail">Student Email <span style="color:var(--text-muted);font-weight:400;">(optional)</span></label>
        <input type="email" id="studentEmail" class="form__control" placeholder="e.g. student@gmail.com">
    </div>

    <div class="form__group" style="margin-top:1.25rem;">
        <label class="form__label">Father's Details</label>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;">
            <input type="text" id="studentFatherName" class="form__control" placeholder="Father's Name">
            <input type="tel" id="studentFatherPhone" class="form__control" placeholder="Father's Phone">
        </div>
    </div>

    <div class="form__group">
        <label class="form__label">Mother's Details</label>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;">
            <input type="text" id="studentMotherName" class="form__control" placeholder="Mother's Name">
            <input type="tel" id="studentMotherPhone" class="form__control" placeholder="Mother's Phone">
        </div>
    </div>

    <button type="submit" class="btn btn--primary btn--full" id="btnAddStudent">
        <span id="btnAddStudentText">Register Student</span>
        <span class="spinner" id="btnAddStudentSpinner" style="display:none;" aria-hidden="true"></span>
    </button>

    <div id="addStudentStatus" class="status" style="display:none;"></div>
</form>
