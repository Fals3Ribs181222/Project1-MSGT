<form id="testimonialForm" class="form">
    <div class="form__group">
        <label for="testimStudentName" class="form__label">Student Name *</label>
        <input type="text" id="testimStudentName" class="form__input" required placeholder="e.g. John Doe">
    </div>

    <div class="form__group">
        <label for="testimSubject" class="form__label">Subject (Optional)</label>
        <input type="text" id="testimSubject" class="form__input" placeholder="e.g. Physics & Math">
    </div>

    <div class="form__group">
        <label for="testimYear" class="form__label">Batch Year (Optional)</label>
        <input type="text" id="testimYear" class="form__input" placeholder="e.g. 2024">
    </div>

    <div class="form__group">
        <label for="testimText" class="form__label">Testimonial Text *</label>
        <textarea id="testimText" class="form__textarea" required placeholder="Enter the testimonial text..."
            rows="4"></textarea>
    </div>

    <div class="form__group">
        <label for="testimMedia" class="form__label">Media Upload (Photo or Video - Optional)</label>
        <input type="file" id="testimMedia" class="form__input" accept="image/*,video/*">
        <small class="form__help">Upload a student photo or video testimonial.</small>
    </div>

    <div class="form__group">
        <button type="submit" class="btn btn--primary btn--full" id="btnAddTestimonial">Add Testimonial</button>
    </div>

    <div id="testimonialStatus" class="status" style="display: none;"></div>
</form>
