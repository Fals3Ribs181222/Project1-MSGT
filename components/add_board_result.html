<form id="boardResultForm">
    <div class="form__group">
        <label class="form__label" for="brStudentName">Student Name</label>
        <input type="text" id="brStudentName" class="form__control" required placeholder="e.g. Rahul Sharma">
    </div>

    <div class="form__group">
        <label class="form__label" for="brSubject">Subject</label>
        <select id="brSubject" class="form__control" required>
            <option value="">Select Subject</option>
            <option value="Accounts">Accounts</option>
            <option value="Commerce">Commerce</option>
        </select>
    </div>

    <div class="form__group">
        <label class="form__label" for="brMarksObtained">Marks Obtained</label>
        <input type="number" id="brMarksObtained" class="form__control" required placeholder="e.g. 95" min="0">
    </div>

    <div class="form__group">
        <label class="form__label" for="brMaxMarks">Maximum Marks</label>
        <input type="number" id="brMaxMarks" class="form__control" required placeholder="e.g. 100" min="1" value="100">
    </div>

    <div class="form__group">
        <label class="form__label" for="brPassingYear">Passing Year</label>
        <input type="number" id="brPassingYear" class="form__control" required placeholder="e.g. 2026" min="2000"
            max="2099">
    </div>

    <button type="submit" class="btn btn--primary btn--full" id="btnAddBoardResult">Add Board Result</button>
    <div id="boardResultStatus" class="status"></div>
</form>
