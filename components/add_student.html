<div class="panel__info">
    <h3>Register New Student</h3>
    <p>Fill out the details below to create a student account. The student will be able to log in immediately with the
        username and password you set.</p>
</div>

<form id="addStudentForm">
    <div class="form__group">
        <label class="form__label" for="studentName">Student Full Name</label>
        <input type="text" id="studentName" class="form__control" required placeholder="e.g. Rahul Sharma">
    </div>

    <div class="form__group">
        <label class="form__label" for="studentGrade">Grade</label>
        <select id="studentGrade" class="form__control" required>
            <option value="">-- Select Grade --</option>
            <option value="11th">11th</option>
            <option value="12th">12th</option>
        </select>
    </div>

    <fieldset class="form__group" style="border: none; padding: 0; margin: 0;">
        <legend class="form__label">Subjects</legend>
        <div class="form__checkbox-group">
            <label class="form__checkbox-label" for="subjAccounts">
                <input type="checkbox" id="subjAccounts" name="studentSubjects" value="Accounts" class="form__checkbox">
                Accounts
            </label>
            <label class="form__checkbox-label" for="subjCommerce">
                <input type="checkbox" id="subjCommerce" name="studentSubjects" value="Commerce" class="form__checkbox">
                Commerce
            </label>
        </div>
    </fieldset>

    <div class="form__group">
        <label class="form__label" for="studentUsername">Username</label>
        <input type="text" id="studentUsername" class="form__control" required placeholder="e.g. rahul.sharma">
    </div>

    <div class="form__group">
        <label class="form__label" for="studentPassword">Password</label>
        <input type="password" id="studentPassword" class="form__control" required placeholder="Set a secure password"
            minlength="6">
    </div>

    <button type="submit" class="btn btn--primary btn--full" id="btnAddStudent">
        <span id="btnAddStudentText">Register Student</span>
        <span class="spinner" id="btnAddStudentSpinner" style="display:none;" aria-hidden="true"></span>
    </button>

    <div id="addStudentStatus" class="status" style="display:none;"></div>
</form>
