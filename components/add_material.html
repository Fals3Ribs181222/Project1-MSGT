<form id="uploadForm">
    <div class="form__group">
        <label class="form__label" for="fileTitle">Material Title</label>
        <input type="text" id="fileTitle" class="form__control" required placeholder="e.g. Chapter 4 Notes">
    </div>

    <div class="form__group">
        <label class="form__label" for="fileGrade">Grade</label>
        <select id="fileGrade" class="form__control"></select>
    </div>

    <div class="form__group">
        <label class="form__label">Subjects</label>
        <div class="subject-pills">
            <label class="subject-pill">
                <input type="checkbox" name="fileSubjects" value="Accounts">
                <span class="subject-pill__label">Accounts</span>
            </label>
            <label class="subject-pill">
                <input type="checkbox" name="fileSubjects" value="Commerce">
                <span class="subject-pill__label">Commerce</span>
            </label>
        </div>
    </div>

    <div class="form__group">
        <label class="form__label">Upload Type</label>
        <div class="subject-pills">
            <label class="subject-pill">
                <input type="radio" name="uploadType" value="student" checked>
                <span class="subject-pill__label">Student Materials</span>
            </label>
            <label class="subject-pill">
                <input type="radio" name="uploadType" value="ai">
                <span class="subject-pill__label">AI Training</span>
            </label>
        </div>
    </div>

    <div class="form__group form__upload-zone">
        <input type="file" id="fileInput" required>
        <p class="form__upload-hint">Max file size: 50MB</p>
    </div>

    <button type="submit" class="btn btn--primary btn--full" id="btnUpload">Upload Material</button>
    <div id="uploadStatus" class="status"></div>
</form>
