<header class="panel__header">
    <h2>Messages</h2>
    <div class="msg-window-legend">
        <span class="msg-window-legend__dot" style="background:var(--secondary);"></span><span>10–24h</span>
        <span class="msg-window-legend__dot" style="background:var(--amber);"></span><span>2–10h</span>
        <span class="msg-window-legend__dot" style="background:var(--cadmium-red);"></span><span>0–2h</span>
        <span class="msg-window-legend__dot" style="background:var(--text-main);"></span><span>Closed</span>
    </div>
    <button class="btn btn--primary btn--sm" id="btnNewMessage">
        <i class="ri-add-line"></i> New Message
    </button>
</header>

<div class="msg-layout" id="msgLayout">
    <!-- ── Left: Contact list ──────────────────────────────────── -->
    <div class="msg-contacts">
        <div class="msg-contacts__search">
            <input type="text" class="form__input" id="msgContactSearch"
                   placeholder="Search contacts...">
        </div>
        <div class="msg-contact-list" id="msgContactList">
            <p style="padding:2rem 1rem; text-align:center; color:var(--text-muted);">
                Loading conversations...
            </p>
        </div>
    </div>

    <!-- ── Right: Thread view ──────────────────────────────────── -->
    <div class="msg-thread" id="msgThread">
        <div class="msg-thread__empty">
            <p>Select a conversation<br>or start a new message</p>
        </div>
    </div>
</div>

<!-- ── New Message Overlay ─────────────────────────────────────── -->
<div class="confirm-overlay" id="newMsgOverlay" style="display:none;">
    <div class="msg-new-modal">
        <h3>New Message</h3>

        <!-- Mode tabs -->
        <div class="msg-new-modal__tabs">
            <button class="msg-new-modal__tab msg-new-modal__tab--active"
                    id="newMsgTabStudent">Select Student</button>
            <button class="msg-new-modal__tab"
                    id="newMsgTabPhone">Enter Phone</button>
        </div>

        <!-- Student mode -->
        <div id="newMsgStudentMode">
            <div style="margin-bottom:0.75rem;">
                <label class="form__label" for="newMsgStudentSelect">Student</label>
                <select class="form__input" id="newMsgStudentSelect">
                    <option value="">Select a student...</option>
                </select>
            </div>
            <div>
                <label class="form__label">Send To</label>
                <div class="subject-pills" id="newMsgRecipient">
                    <label class="subject-pill">
                        <input type="radio" name="newMsgRecipientRadio" value="parent" checked>
                        <span class="subject-pill__label">Parent</span>
                    </label>
                    <label class="subject-pill">
                        <input type="radio" name="newMsgRecipientRadio" value="student">
                        <span class="subject-pill__label">Student</span>
                    </label>
                    <label class="subject-pill">
                        <input type="radio" name="newMsgRecipientRadio" value="both">
                        <span class="subject-pill__label">Both</span>
                    </label>
                </div>
            </div>
        </div>

        <!-- Phone mode (hidden by default) -->
        <div id="newMsgPhoneMode" style="display:none;">
            <label class="form__label" for="newMsgPhoneInput">Phone Number (10 digits)</label>
            <input type="tel" class="form__input" id="newMsgPhoneInput"
                   placeholder="e.g. 9876543210" maxlength="10">
        </div>

        <!-- Message -->
        <div>
            <label class="form__label" for="newMsgText">Message</label>
            <textarea class="form__input" id="newMsgText" rows="4" maxlength="1000"
                      placeholder="Type your message..."></textarea>
        </div>

        <!-- Actions -->
        <div style="display:flex; gap:0.75rem; justify-content:flex-end;">
            <button class="btn btn--outline btn--sm" id="newMsgCancel">Cancel</button>
            <button class="btn btn--primary btn--sm" id="newMsgSend">
                <i class="ri-send-plane-fill"></i> Send
            </button>
        </div>

        <div id="newMsgStatus" class="status" style="display:none;"></div>
    </div>
</div>
