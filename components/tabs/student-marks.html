<header class="panel__header">
    <h2>My Marks</h2>
    <button class="btn btn--outline btn--sm" id="btnRefreshMarks">Refresh</button>
</header>

<div id="marksPerfCards" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-bottom:1.5rem;"></div>

<div class="pill-toggle" id="marksSubjectPills" style="margin-bottom:1.25rem;width:fit-content;"></div>

<p id="marksStatus" class="status"></p>

<div class="table-wrap">
    <table class="data-table" aria-label="Tests and marks">
        <thead>
            <tr>
                <th scope="col">Date</th>
                <th scope="col">Test Title</th>
                <th scope="col">Earned</th>
                <th scope="col">%</th>
            </tr>
        </thead>
        <tbody id="marksTableBody">
            <tr><td colspan="4" class="loading-text">Loading...</td></tr>
        </tbody>
    </table>
</div>
