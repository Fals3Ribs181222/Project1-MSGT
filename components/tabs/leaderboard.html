<header class="panel__header">
    <h2>Leaderboard</h2>
    <button class="btn btn--outline btn--sm" id="btnRefreshLeaderboard">Refresh</button>
</header>

<div id="leaderboardStatus" class="status"></div>

<div id="leaderboardColumns" class="leaderboard-grid">

    <!-- Grade 11 -->
    <div id="leaderboardCol11">

        <div class="leaderboard-subject-section">
            <div class="leaderboard-subject-header">
                <h3>Grade 11 — Accounts</h3>
                <p id="avg11A"></p>
            </div>
            <div class="table-wrap">
                <table aria-label="Grade 11 Accounts rankings">
                    <thead>
                        <tr>
                            <th scope="col">Rank</th>
                            <th scope="col">Student</th>
                            <th scope="col" title="Bayesian score">Score</th>
                            <th scope="col">Avg %</th>
                            <th scope="col">Tests</th>
                        </tr>
                    </thead>
                    <tbody id="lb11A">
                        <tr><td colspan="5" class="loading-text">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="leaderboard-subject-section">
            <div class="leaderboard-subject-header">
                <h3>Grade 11 — Commerce</h3>

                    <tbody id="lb11C">

            </div>
        </div>

    </div>
