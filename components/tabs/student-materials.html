<header class="panel__header" id="materialsHeader">
    <h2>Study Materials</h2>
    <button class="btn btn--outline btn--sm" id="btnRefreshMaterials">Refresh</button>
</header>

<p id="materialsStatus" class="status"></p>

<div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap;margin-bottom:1.25rem;">
    <div class="pill-toggle" id="matSubjectPills" style="width:fit-content;"></div>
    <input type="search" id="matSearchInput" class="filter-bar__control" placeholder="Search by title..." style="max-width:220px;">
</div>

<div class="material-list" id="materialsList">
    <div class="loading-text">Loading materials...</div>
</div>

<!-- Inline PDF viewer (shown in place of the list) -->
<div id="pdfInlineViewer" style="display:none;">
    <div class="pdf-inline__header" style="display:flex;align-items:center;gap:1rem;margin-bottom:1rem;">
        <button class="btn btn--outline btn--sm" id="pdfBackBtn" style="flex-shrink:0;">&#8592; Back to Materials</button>
        <h3 id="pdfInlineTitle" style="margin:0;font-size:1.1rem;"></h3>
    </div>
    <div class="pdf-inline__canvas-wrap" id="pdfCanvasWrap">
        <div class="pdf-modal__loading">Loading PDF&#8230;</div>
    </div>
</div>
