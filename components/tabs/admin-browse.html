<header class="panel__header">
    <h2>Table Browser</h2>
</header>
<p style="color:var(--text-muted);margin-bottom:1rem;font-size:0.9rem;">
    Browse and delete rows from any system table. Showing up to 50 rows per page.
</p>
<div style="display:flex;gap:0.75rem;align-items:center;margin-bottom:1.25rem;flex-wrap:wrap;">
    <select id="browseTableSelect" class="filter-bar__control" style="min-width:200px;">
        <option value="">Select a table...</option>
        <option value="profiles">profiles</option>
        <option value="tests">tests</option>
        <option value="marks">marks</option>
        <option value="attendance">attendance</option>
        <option value="classes">classes</option>
        <option value="batches">batches</option>
        <option value="batch_students">batch_students</option>
        <option value="announcements">announcements</option>
        <option value="files">files</option>
        <option value="whatsapp_log">whatsapp_log</option>
        <option value="board_results">board_results</option>
        <option value="testimonials">testimonials</option>
        <option value="material_chunks">material_chunks</option>
        <option value="rank_history">rank_history</option>
        <option value="feature_flags">feature_flags</option>
    </select>
    <button class="btn btn--outline btn--sm" id="btnBrowseLoad">Load Table</button>
</div>
<div id="browseStatus" class="status" style="display:none;margin-bottom:0.75rem;"></div>
<div id="browseInfo" style="color:var(--text-muted);font-size:0.85rem;margin-bottom:0.5rem;"></div>
<div class="table-wrap" id="browseTableWrap" style="display:none;">
    <table id="browseTable">
        <thead id="browseTableHead"></thead>
        <tbody id="browseTableBody"></tbody>
    </table>
</div>
<div style="display:flex;gap:0.75rem;margin-top:1rem;" id="browsePagination" style="display:none;">
    <button class="btn btn--outline btn--sm" id="btnBrowsePrev" disabled>← Previous</button>
    <button class="btn btn--outline btn--sm" id="btnBrowseNext">Next →</button>
</div>
