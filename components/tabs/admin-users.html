<header class="panel__header">
    <h2>User Management</h2>
    <button class="btn btn--outline btn--sm" id="btnRefreshUsers">Refresh</button>
</header>
<div class="filter-bar__group" style="margin-bottom:1rem;">
    <input type="search" id="userSearch" class="filter-bar__control" placeholder="Search name or username...">
    <select id="userRoleFilter" class="filter-bar__control">
        <option value="">All Roles</option>
        <option value="student">Student</option>
        <option value="teacher">Teacher</option>
        <option value="admin">Admin</option>
    </select>
</div>
<div id="usersStatus" class="status" style="display:none;"></div>
<p id="usersCount" style="color:var(--text-muted);font-size:0.85rem;margin-bottom:0.75rem;"></p>
<div class="table-wrap">
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Username</th>
                <th>Role</th>
                <th>Grade</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="usersTableBody">
            <tr><td colspan="5" class="loading-text">Loading users...</td></tr>
        </tbody>
    </table>
</div>
