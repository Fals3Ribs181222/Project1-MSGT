<header class="panel__header">
    <h2 id="materialsTabTitle">Notes</h2>
    <div class="tab-pill-selector">
        <button class="tab-pill-selector__btn tab-pill-selector__btn--active" id="pillViewMaterials"
            style="display:inline-flex;align-items:center;gap:0.35rem;">
            <i class="ri-folder-open-line"></i> Resources
        </button>
        <button class="tab-pill-selector__btn" id="pillViewAiMaterials"
            style="display:inline-flex;align-items:center;gap:0.35rem;">
            <i class="ri-brain-line"></i> AI Training
        </button>
        <button class="tab-pill-selector__btn" id="pillViewTests"
            style="display:inline-flex;align-items:center;gap:0.35rem;">
            <i class="ri-file-list-3-line"></i> Tests
        </button>
        <button class="tab-pill-selector__btn" id="pillAddMaterial"
            style="display:inline-flex;align-items:center;gap:0.35rem;">
            <i class="ri-upload-cloud-line"></i> Upload
        </button>
    </div>
</header>

<!-- Materials List Container (default view) -->
<div id="materialsListContainer">
    <div id="materialsListStatus" class="status"></div>
    <div class="table-wrap">
        <table id="materialsTable" aria-label="Materials list">
            <thead>
                <tr>
                    <th scope="col">Title</th>
                    <th scope="col">Subject</th>
                    <th scope="col">Grade</th>
                    <th scope="col">Date</th>
                    <th scope="col">Link</th>
                    <th scope="col"></th>
                </tr>
            </thead>
            <tbody id="materialsTableBody">
                <tr>
                    <td colspan="6" class="loading-text">Loading materials...</td>
                </tr>
            </tbody>
        </table>
    </div>
    <div class="text-right">
        <button class="btn btn--primary btn--sm" id="btnRefreshMaterials">Refresh List</button>
    </div>
</div>

<!-- AI Materials Container -->
<div id="aiMaterialsListContainer" style="display:none;">
    <div id="aiMaterialsListStatus" class="status"></div>
    <div class="table-wrap">
        <table id="aiMaterialsTable" aria-label="AI materials list">
            <thead>
                <tr>
                    <th scope="col">Title</th>
                    <th scope="col">Subject</th>
                    <th scope="col">Grade</th>
                    <th scope="col">Date</th>
                    <th scope="col">Link</th>
                    <th scope="col"></th>
                </tr>
            </thead>
            <tbody id="aiMaterialsTableBody">
                <tr>
                    <td colspan="6" class="loading-text">Loading AI materials...</td>
                </tr>
            </tbody>
        </table>
    </div>
    <div class="text-right">
        <button class="btn btn--primary btn--sm" id="btnRefreshAiMaterials">Refresh List</button>
    </div>
</div>

<!-- Tests Container -->
<div id="testsListContainer" style="display:none;">
    <div id="testsListStatus" class="status"></div>
    <div class="table-wrap">
        <table id="testsTable" aria-label="Saved tests list">
            <thead>
                <tr>
                    <th scope="col">Title</th>
                    <th scope="col">Subject</th>
                    <th scope="col">Grade</th>
                    <th scope="col">Date</th>
                    <th scope="col">Link</th>
                    <th scope="col"></th>
                </tr>
            </thead>
            <tbody id="testsTableBody">
                <tr>
                    <td colspan="6" class="loading-text">Loading tests...</td>
                </tr>
            </tbody>
        </table>
    </div>
    <div class="text-right">
        <button class="btn btn--primary btn--sm" id="btnRefreshTests">Refresh List</button>
    </div>
</div>

<!-- Add Material Container (loaded via fetch) -->
<div id="addMaterialContainer">
    <div class="loading-text">Loading component...</div>
</div>
