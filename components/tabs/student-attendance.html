<header class="panel__header">
    <h2>My Attendance</h2>
    <button class="btn btn--outline btn--sm" id="btnRefreshAttendance">Refresh</button>
</header>

<p id="attendanceStatus" class="status"></p>

<!-- Stats + Calendar split by subject -->
<div id="attendanceSubjectSections" style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-bottom:1.5rem;"></div>

<!-- Filters -->
<div style="margin-bottom:1.25rem;">
    <div class="pill-toggle" id="attBatchPills" style="width:fit-content;"></div>
</div>

<!-- Detail table -->
<div class="table-wrap">
    <table class="data-table" aria-label="Attendance records">
        <thead>
            <tr>
                <th scope="col">Date</th>
                <th scope="col">Batch</th>
                <th scope="col">Subject</th>
                <th scope="col">Status</th>
            </tr>
        </thead>
        <tbody id="attendanceTableBody">
            <tr><td colspan="4" class="loading-text">Loading...</td></tr>
        </tbody>
    </table>
</div>
