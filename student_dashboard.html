<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="description" content="Student Dashboard — access study materials, notices, test marks, and more.">
    <title>Student Dashboard | Mitesh Sir's Study Circle</title>
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Mitesh Bhatt" />
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css">
    <script defer src="/_vercel/insights/script.js"></script>
</head>

<body class="dash-page">
    <nav class="navbar" aria-label="Main navigation">
        <div class="navbar__container" style="padding: 0 2rem;">
            <a href="index" class="navbar__logo"><img src="logo.png" alt="Mitesh Sir's Study Circle" style="height:70px;width:auto;display:block;"><span style="font-size:1rem;font-weight:700;color:var(--text-primary,#1a1a2e);white-space:nowrap;">Mitesh Sir's Study Circle</span></a>
            <ul class="navbar__links" style="background:none;border:none;padding:0;gap:0.25rem;">
                <li><a href="index" class="navbar__link">Home</a></li>
                <li><a href="results" class="navbar__link">Results</a></li>
            </ul>
        </div>
    </nav>

    <div class="dash-layout">

        <!-- SIDEBAR -->
        <aside class="dash-sidebar" id="dashSidebar">
            <div class="dash-sidebar__top">
                <a href="index"><img src="logo.png" alt="Mitesh Sir's Study Circle" style="height:72px;width:auto;"></a>
            </div>
            <nav class="dash-sidebar__nav">
                <button class="dash-sidebar__item dash-sidebar__item--active" data-target="panel-student-home">
                    <span>⊞</span> Dashboard
                </button>
                <button class="dash-sidebar__item" data-target="panel-student-marks">
                    <span>📝</span> My Marks
                </button>
                <button class="dash-sidebar__item" data-target="panel-student-materials">
                    <span>📚</span> Materials
                </button>
                <button class="dash-sidebar__item" data-target="panel-student-notices">
                    <span>📢</span> Notice Board
                </button>
                <button class="dash-sidebar__item" data-target="panel-student-schedule">
                    <span>📅</span> Schedule
                </button>
                <button class="dash-sidebar__item" data-target="panel-student-attendance">
                    <span>✅</span> Attendance
                </button>
                <button class="dash-sidebar__item" data-target="panel-student-leaderboard">
                    <span>🏅</span> Leaderboard
                </button>
                <button class="dash-sidebar__item" data-target="panel-student-ask-ai">
                    <span>🧠</span> Ask AI
                </button>
                <button class="dash-sidebar__item" data-target="panel-student-profile">
                    <span>👤</span> My Profile
                </button>
            </nav>
            <div class="dash-sidebar__bottom">
                <button class="dash-sidebar__logout" id="btnSidebarLogout">⏻ Logout</button>
                <div class="dash-sidebar__profile">
                    <div class="dash-sidebar__avatar" id="sidebarAvatar">S</div>
                    <div>
                        <div class="dash-sidebar__name" id="sidebarName">Student</div>
                        <div class="dash-sidebar__role">Student</div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="dash-main">
            <!-- Hamburger toggle (mobile only) -->
            <button class="dash-menu-toggle" id="dashMenuToggle" aria-label="Open navigation">☰</button>

            <div class="panels-container" id="dashboard-content">

                <!-- HOME PANEL (static — widgets populated by loadStudentHomeWidgets) -->
                <section class="tabs__panel tabs__panel--active" id="panel-student-home" role="tabpanel" aria-label="Home">
                    <div class="dash-widgets">

                        <!-- Attendance widget -->
                        <div class="dash-widget dash-widget--full">
                            <div class="dash-widget__header">
                                <div>
                                    <h3>My Attendance</h3>
                                    <p class="dash-widget__sub" id="homeAttSubtitle">—</p>
                                </div>
                                <button class="btn btn--outline btn--sm" onclick="window.loadTab('panel-student-attendance')">View Full</button>
                            </div>
                            <div id="homeAttSubjects" style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;"></div>
                        </div>

                        <!-- Tests widget -->
                        <div class="dash-widget">
                            <div class="dash-widget__header">
                                <h3>Tests</h3>
                                <button class="btn btn--outline btn--sm" onclick="window.loadTab('panel-student-marks')">My Marks</button>
                            </div>
                            <div id="homeUpcomingTests" class="tests-preview-list">
                                <p class="loading-text">Loading...</p>
                            </div>
                        </div>

                        <!-- Mini leaderboard widget -->
                        <div class="dash-widget">
                            <div class="dash-widget__header">
                                <div>
                                    <h3>🏆 Leaderboard</h3>
                                    <span class="dash-widget__badge" id="homeLBBadge">GRADE</span>
                                </div>
                                <button class="btn btn--outline btn--sm" onclick="window.loadTab('panel-student-leaderboard')">Full Board</button>
                            </div>
                            <div class="mini-leaderboard" id="homeMiniLeaderboard">
                                <p class="loading-text">Loading...</p>
                            </div>
                        </div>

                        <!-- Ask AI widget -->
                        <div class="dash-widget">
                            <div class="dash-widget__header">
                                <h3>🧠 Ask AI</h3>
                                <button class="btn btn--outline btn--sm" onclick="window.loadTab('panel-student-ask-ai')">Open AI</button>
                            </div>
                            <select id="homeAiSubject" class="form__select">
                                <option>Accounts</option>
                                <option>Economics</option>
                                <option>Commerce</option>
                                <option>Maths</option>
                            </select>
                            <textarea id="homeAiQuestion" class="form__textarea" rows="3" placeholder="Ask a question about your subject..."></textarea>
                            <button class="btn btn--primary btn--sm" id="btnHomeAsk">Ask</button>
                        </div>

                    </div>
                </section>
                <!-- Dynamic tabs loaded by router.js -->

            </div>
        </main>
    </div>

    <!-- Sidebar backdrop (mobile) -->
    <div class="dash-sidebar-backdrop" id="sidebarBackdrop"></div>

    <footer class="footer" style="background: var(--glass-bg); backdrop-filter: blur(16px); padding: 1rem 0; border-top: 1px solid var(--border-color);">
        <div class="container">
            <p style="text-align:center; font-size:0.875rem; color:var(--text-muted); margin:0;">&copy; 2026 Mitesh Sir's Study Circle. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/app.js"></script>
    <script type="module">
        import { loadTab, initRouter, prefetchTabs } from "./js/dashboard/router.js";
        window.loadTab = loadTab;
        initRouter('panel-student-home');
        prefetchTabs([
            'student-marks', 'student-materials', 'student-notices',
            'student-schedule', 'student-attendance', 'student-leaderboard',
            'student-ask-ai', 'student-profile'
        ]);
    </script>

    <!-- Auth guard -->
    <script>
        (async () => {
            const user = await window.auth.requireRole("student");
            if (!user) return;
            document.getElementById("sidebarName").textContent = user.name || 'Student';
            document.getElementById("sidebarAvatar").textContent = user.name?.[0]?.toUpperCase() || 'S';
            window.auth.refreshProfile();
        })();
    </script>

    <!-- Feature flag gating -->
    <script>
        (async () => {
            const flags = await window.loadFeatureFlags();
            if (!flags.student_portal_enabled) {
                document.querySelector('main').innerHTML =
                    '<div class="status status--error" style="margin:3rem auto;max-width:480px;text-align:center;">' +
                    'The student portal is temporarily unavailable. Please check back later.</div>';
                window.loadTab = () => {};
                return;
            }
            // Hide individual tabs via flags
            const hideSidebarItem = (target) => {
                const btn = document.querySelector(`.dash-sidebar__item[data-target="${target}"]`);
                if (btn) btn.style.display = 'none';
            };
            if (!flags.ai_tools_enabled) hideSidebarItem('panel-student-ask-ai');
            if (!flags.leaderboard_enabled) hideSidebarItem('panel-student-leaderboard');
            if (!flags.materials_enabled) hideSidebarItem('panel-student-materials');
        })();
    </script>

    <!-- Sidebar wiring -->
    <script>
        const sidebar = document.getElementById('dashSidebar');
        const backdrop = document.getElementById('sidebarBackdrop');

        document.getElementById('dashMenuToggle').addEventListener('click', () => {
            sidebar.classList.add('dash-sidebar--open');
            backdrop.classList.add('dash-sidebar-backdrop--visible');
        });
        backdrop.addEventListener('click', () => {
            sidebar.classList.remove('dash-sidebar--open');
            backdrop.classList.remove('dash-sidebar-backdrop--visible');
        });

        document.querySelectorAll('.dash-sidebar__item[data-target]').forEach(btn => {
            btn.addEventListener('click', () => {
                window.loadTab(btn.dataset.target);
                sidebar.classList.remove('dash-sidebar--open');
                backdrop.classList.remove('dash-sidebar-backdrop--visible');
            });
        });

        document.getElementById('btnSidebarLogout').addEventListener('click', () => window.auth.logout());
    </script>

    <!-- Home panel widgets -->
    <script>
        async function loadStudentHomeWidgets() {
            const user = window.auth.getUser();
            if (!user) return;

            const today = new Date().toISOString().slice(0, 10);

            // Update attendance subtitle
            document.getElementById('homeAttSubtitle').textContent =
                `Grade: ${user.grade || 'N/A'} · Subjects: ${user.subjects || 'N/A'}`;

            // Fetch all data in parallel
            const [attRes, testsRes, marksRes, lbRes] = await Promise.all([
                window.api.get('attendance', { student_id: user.id }, 'status, date, classes:class_id(batches:batch_id(subject))'),
                window.api.get('tests', { grade: user.grade }, '*', { order: 'date', ascending: true }),
                window.api.get('marks', { student_id: user.id }),
                window.api.get('student_rankings', { grade: user.grade }, '*', { order: 'rank', ascending: true })
            ]);

            // ── Attendance rings (per subject) ────────────────────────
            const attRecords = attRes.data || [];
            const colorMap = { present: '#1D9E75', late: '#BA7517', absent: '#E24B4A' };
            const circumference = 2 * Math.PI * 50;

            // Group records by subject; fall back to 'Overall' if no subject info
            const subjectMap = {};
            attRecords.forEach(r => {
                const subj = r.classes?.batches?.subject || 'Overall';
                if (!subjectMap[subj]) subjectMap[subj] = [];
                subjectMap[subj].push(r);
            });

            // If no subject breakdown available, show single overall ring
            const subjects = Object.keys(subjectMap);
            if (subjects.length === 0) subjectMap['Overall'] = [];

            const subjectsEl = document.getElementById('homeAttSubjects');
            subjectsEl.innerHTML = '';
            // Adjust columns to number of subjects
            subjectsEl.style.gridTemplateColumns = `repeat(${Math.min(subjects.length || 1, 3)}, 1fr)`;

            (subjects.length ? subjects : ['Overall']).forEach((subj, idx) => {
                const recs   = subjectMap[subj] || [];
                const total   = recs.length;
                const present = recs.filter(r => r.status === 'present').length;
                const absent  = recs.filter(r => r.status === 'absent').length;
                const late    = recs.filter(r => r.status === 'late').length;
                const pct     = total > 0 ? Math.round(((present + late) / total) * 100) : 0;
                const ringColor = pct >= 80 ? '#1D9E75' : pct >= 60 ? '#BA7517' : '#E24B4A';
                const ringId  = `attRingFill_${idx}`;

                const datedSubjRecs = recs.filter(r => r.date).sort((a, b) => a.date.localeCompare(b.date));
                const dotsHtml = datedSubjRecs.length
                    ? datedSubjRecs.map(r => {
                        const label = new Date(r.date + 'T00:00:00').toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });
                        const bg = colorMap[r.status] || '#ccc';
                        return `<div title="${label} · ${r.status}" style="width:12px;height:12px;border-radius:3px;background:${bg};cursor:default;flex-shrink:0;"></div>`;
                    }).join('')
                    : '<span style="font-size:0.75rem;color:var(--text-muted);">No records yet.</span>';

                subjectsEl.insertAdjacentHTML('beforeend', `
                    <div style="display:flex;flex-direction:column;gap:0.75rem;">
                        <div style="display:flex;gap:1.25rem;align-items:center;flex-wrap:wrap;">
                            <div class="att-ring-wrap">
                                <svg class="att-ring" viewBox="0 0 120 120">
                                    <circle class="att-ring__bg" cx="60" cy="60" r="50"/>
                                    <circle class="att-ring__fill" id="${ringId}" cx="60" cy="60" r="50"
                                        style="stroke:${ringColor};stroke-dasharray:${circumference};stroke-dashoffset:${circumference};transition:stroke-dashoffset 1s ease;"/>
                                </svg>
                                <div class="att-ring__label">
                                    <span class="att-ring__pct">${total > 0 ? pct + '%' : '—'}</span>
                                    <span class="att-ring__sub">${window.esc(subj)}</span>
                                </div>
                            </div>
                            <div style="display:flex;gap:1rem;flex-wrap:wrap;">
                                <div><p style="font-size:2.25rem;font-weight:700;color:var(--primary);margin:0">${total || '—'}</p><p style="font-size:1rem;color:var(--text-muted);margin:0">Total</p></div>
                                <div><p style="font-size:2.25rem;font-weight:700;color:#1D9E75;margin:0">${present || '—'}</p><p style="font-size:1rem;color:var(--text-muted);margin:0">Present</p></div>
                                <div><p style="font-size:2.25rem;font-weight:700;color:#E24B4A;margin:0">${absent || '—'}</p><p style="font-size:1rem;color:var(--text-muted);margin:0">Absent</p></div>
                                <div><p style="font-size:2.25rem;font-weight:700;color:#BA7517;margin:0">${late || '—'}</p><p style="font-size:1rem;color:var(--text-muted);margin:0">Late</p></div>
                            </div>
                        </div>
                        <div style="display:flex;flex-wrap:wrap;gap:4px;">${dotsHtml}</div>
                    </div>`);

                if (total > 0) {
                    requestAnimationFrame(() => {
                        requestAnimationFrame(() => {
                            const el = document.getElementById(ringId);
                            if (el) el.style.strokeDashoffset = circumference * (1 - pct / 100);
                        });
                    });
                }
            });


            // ── Upcoming tests ────────────────────────────────────────
            const allTests = testsRes.data || [];
            const marksMap = {};
            (marksRes.data || []).forEach(m => { marksMap[m.test_id] = m; });

            const upcoming = allTests.filter(t => t.date >= today).slice(0, 3);
            const upcomingEl = document.getElementById('homeUpcomingTests');
            if (upcoming.length) {
                upcomingEl.innerHTML = upcoming.map(t => {
                    const m = marksMap[t.id];
                    const status = m
                        ? `<span style="color:var(--primary);font-weight:600;">${m.marks_obtained}/${t.max_marks}</span>`
                        : `<span style="color:var(--gray-500);">Upcoming</span>`;
                    return `<div class="test-preview-item">
                        <div class="test-preview-item__body">
                            <strong>${window.esc(t.title || 'Untitled')}</strong>
                            <span class="text-muted">${window.esc(t.subject || '')} · ${t.date || ''} · ${t.max_marks || '?'} marks · ${status}</span>
                        </div>
                    </div>`;
                }).join('');
            } else {
                const recent = allTests.filter(t => t.date < today).slice(-3).reverse();
                if (recent.length) {
                    upcomingEl.innerHTML = recent.map(t => {
                        const m = marksMap[t.id];
                        const score = m ? `${m.marks_obtained}/${t.max_marks}` : 'Not graded';
                        return `<div class="test-preview-item test-preview-item--past">
                            <span class="test-preview-item__badge">Past</span>
                            <div class="test-preview-item__body">
                                <strong>${window.esc(t.title || 'Untitled')}</strong>
                                <span class="text-muted">${window.esc(t.subject || '')} · ${t.date || ''} · ${score}</span>
                            </div>
                        </div>`;
                    }).join('');
                } else {
                    upcomingEl.innerHTML = '<p class="loading-text">No tests yet.</p>';
                }
            }

            // ── Mini leaderboard (top 3 in grade) ────────────────────
            const miniLb = document.getElementById('homeMiniLeaderboard');
            const lbRows = (lbRes.data || [])
                .sort((a, b) => {
                    if (a.final_score === null) return 1;
                    if (b.final_score === null) return -1;
                    return Number(a.rank) - Number(b.rank);
                })
                .filter(s => s.final_score !== null)
                .slice(0, 3);

            if (lbRows.length) {
                const medals = ['🥇', '🥈', '🥉'];
                const myId = user.id;
                miniLb.innerHTML = lbRows.map((s, i) => {
                    const isMe = s.student_id === myId;
                    return `<div class="mini-lb-row${isMe ? ' mini-lb-row--me' : ''}">
                        <span class="mini-lb-row__medal">${medals[i] || (i + 1)}</span>
                        <div class="mini-lb-row__avatar">${s.name?.[0]?.toUpperCase() || '?'}</div>
                        <div class="mini-lb-row__info">
                            <strong>${window.esc(s.name || '—')}${isMe ? ' (You)' : ''}</strong>
                            <span>${window.esc(s.subject || '')}</span>
                        </div>
                        <span class="mini-lb-row__score">${Math.round(s.final_score ?? 0)}</span>
                    </div>`;
                }).join('');
                document.getElementById('homeLBBadge').textContent = (user.grade || 'Grade').toUpperCase();
            } else {
                miniLb.innerHTML = '<p class="loading-text">No rankings yet.</p>';
            }

            // ── Ask AI quick widget ───────────────────────────────────
            document.getElementById('btnHomeAsk')?.addEventListener('click', () => {
                const subject  = document.getElementById('homeAiSubject')?.value || 'Accounts';
                const question = document.getElementById('homeAiQuestion')?.value.trim() || '';
                if (!question) {
                    document.getElementById('homeAiQuestion')?.focus();
                    return;
                }
                sessionStorage.setItem('aiQuickAsk', JSON.stringify({ subject, question }));
                window.loadTab('panel-student-ask-ai');
            });

            // Also allow Enter key in the question input
            document.getElementById('homeAiQuestion')?.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') document.getElementById('btnHomeAsk')?.click();
            });
        }

        document.addEventListener('DOMContentLoaded', loadStudentHomeWidgets);
    </script>

</body>

</html>
