<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seed Trial Tests</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            max-width: 700px;
            margin: 3rem auto;
            padding: 0 1.5rem;
            background: #f5f5f5;
            color: #2d3748;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 0.25rem;
        }

        p.sub {
            color: #666;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        button {
            background: #D97A3E;
            color: white;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            margin-bottom: 1.5rem;
        }

        button:disabled {
            background: #aaa;
            cursor: not-allowed;
        }

        .log {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 1rem 1.25rem;
            font-size: 0.875rem;
            line-height: 2;
            min-height: 100px;
        }

        .ok {
            color: #2d7a2d;
        }

        .err {
            color: #c0392b;
        }

        .info {
            color: #D97A3E;
            font-weight: 600;
        }

        #progress {
            margin-bottom: 0.75rem;
            font-weight: 600;
            color: #444;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        select {
            padding: 0.75rem 1rem;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 1rem;
            background: white;
            color: #2d3748;
            cursor: pointer;
        }

        .controls button {
            margin-bottom: 0;
        }
    </style>
</head>

<body>

    <h1>📝 Seed Trial Tests</h1>
    <p class="sub">
        Creates 15 dummy tests in your Supabase project (Test 1 - Test 15).<br>
        <strong>You must be logged in as the teacher before running this.</strong>
        Open your teacher dashboard first, then come back to this file.
    </p>

    <div class="controls">
        <select id="gradeSelect">
            <option value="12th" selected>Grade 12th</option>
            <option value="11th">Grade 11th</option>
        </select>
        <button id="btnRun" onclick="runSeed()">Create 15 Tests</button>
    </div>
    <div id="progress"></div>
    <div class="log" id="log">Waiting to start...</div>

    <script>
        // ── Config ────────────────────────────────────────────────────────────────────
        const SUPABASE_URL = 'https://tksruuqtzxflgglnljef.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrc3J1dXF0enhmbGdnbG5samVmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNzY0OTIsImV4cCI6MjA4Nzk1MjQ5Mn0.eu6LwoP-9O5sG9nHhBza0UgYHCOm7Ni5flk_1Lgl4FU';

        const { createClient } = supabase;
        const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ── Helpers ───────────────────────────────────────────────────────────────────
        function log(msg, type = '') {
            const div = document.getElementById('log');
            const line = document.createElement('div');
            line.className = type;
            line.textContent = msg;
            div.appendChild(line);
            div.scrollTop = div.scrollHeight;
        }

        function setProgress(current, total, prefix = 'Creating') {
            document.getElementById('progress').textContent =
                current < total ? `${prefix} test ${current} of ${total}...` : `✅ Done — ${total} tests ${prefix.toLowerCase()}ed.`;
        }

        // ── Main Seed Function ────────────────────────────────────────────────────────
        async function runSeed() {
            const btn = document.getElementById('btnRun');
            btn.disabled = true;
            document.getElementById('log').innerHTML = '';

            const selectedGrade = document.getElementById('gradeSelect').value;

            // 1. Check the teacher is logged in
            const { data: sessionData } = await client.auth.getSession();
            const teacherSession = sessionData?.session;

            if (!teacherSession) {
                log('⚠️  Not logged in. Please log into the teacher dashboard first, then reopen this file.', 'err');
                btn.disabled = false;
                return;
            }

            log(`Logged in as teacher. Seeding grade ${selectedGrade} tests...`, 'info');

            // 2. Fetch and Delete Existing Tests for this grade
            log(`Fetching existing ${selectedGrade} dummy tests to remove...`, 'info');
            try {
                const { data: existingTests, error: fetchError } = await client
                    .from('tests')
                    .select('id, title')
                    .ilike('title', 'Test %')
                    .eq('grade', selectedGrade);

                if (fetchError) {
                    log(`✗ Error fetching existing tests: ${fetchError.message}`, 'err');
                } else if (existingTests && existingTests.length > 0) {
                    log(`Found ${existingTests.length} existing dummy tests. Deleting...`, 'info');
                    for (let j = 0; j < existingTests.length; j++) {
                        const t = existingTests[j];
                        setProgress(j + 1, existingTests.length, 'Deleting');

                        const { error: delError } = await client.from('tests').delete().eq('id', t.id);

                        if (delError) {
                            log(`✗ Failed to delete test ${t.title}: ${delError.message}`, 'err');
                        } else {
                            log(`✓ Deleted test: ${t.title}`, 'ok');
                        }
                        await new Promise(r => setTimeout(r, 100)); // Rate Limit
                    }
                    log('─────────────────────────────────────', 'info');
                } else {
                    log('No existing dummy tests found to delete.', 'info');
                    log('─────────────────────────────────────', 'info');
                }
            } catch (e) {
                log(`✗ Error checking for existing tests: ${e.message}`, 'err');
            }

            let successCount = 0;
            let failCount = 0;
            const NUM_TESTS = 15;

            log('Starting creation of new tests...', 'info');

            for (let i = 1; i <= NUM_TESTS; i++) {
                setProgress(i, NUM_TESTS, 'Creating');

                // Alternate subjects for variety
                const subject = (i % 2 === 0) ? 'Accounts' : 'Commerce';
                // Generate a date within the last 30 days
                const testDate = new Date();
                testDate.setDate(testDate.getDate() - (NUM_TESTS - i) * 2);

                const newTest = {
                    title: `Test ${i}`,
                    grade: selectedGrade,
                    subject: subject,
                    date: testDate.toISOString().split('T')[0],
                    max_marks: 50,
                    scheduled_by: teacherSession.user.id
                };

                try {
                    const { error } = await client.from('tests').insert(newTest);

                    if (error) {
                        log(`✗  ${newTest.title} — ${error.message}`, 'err');
                        failCount++;
                    } else {
                        log(`✓  ${newTest.title} — ${newTest.grade} ${newTest.subject} (Max: 50)`, 'ok');
                        successCount++;
                    }
                } catch (err) {
                    log(`✗  ${newTest.title} — Unexpected error: ${err.message}`, 'err');
                    failCount++;
                }

                // Small delay to avoid hitting Supabase rate limits
                await new Promise(r => setTimeout(r, 400));
            }

            setProgress(NUM_TESTS, NUM_TESTS, 'Processing');
            log('─────────────────────────────────────', 'info');
            log(`Created: ${successCount}   Failed: ${failCount}`, 'info');

            btn.disabled = false;
            btn.textContent = 'Run Again';
        }
    </script>

</body>

</html>
