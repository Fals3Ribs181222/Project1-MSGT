<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Board Results | Mitesh Sir's Study Circle</title>
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Mitesh Bhatt" />
    <link rel="manifest" href="/site.webmanifest" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<main class="container section">
    <header style="margin-bottom:2rem;">
        <h1>Manage Board Results</h1>
        <p style="color:var(--text-muted);">Add or delete ISC board results shown on the public Results page.</p>
    </header>

    <!-- Add Form -->
    <section class="panel" style="margin-bottom:2rem;">
        <header class="panel__header"><h2>Add Board Result</h2></header>
        <form id="boardResultForm">
            <div class="form__group">
                <label class="form__label">Student Name *</label>
                <input type="text" id="brName" class="form__control" required placeholder="e.g. Rahul Sharma">
            </div>
            <div class="form__group">
                <label class="form__label">Subject *</label>
                <select id="brSubject" class="form__control" required>
                    <option value="">Select Subject</option>
                    <option value="Accounts">Accounts</option>
                    <option value="Commerce">Commerce</option>
                </select>
            </div>
            <div class="form__group">
                <label class="form__label">Marks Obtained *</label>
                <input type="number" id="brMarks" class="form__control" required min="0" placeholder="e.g. 95">
            </div>
            <div class="form__group">
                <label class="form__label">Maximum Marks *</label>
                <input type="number" id="brMaxMarks" class="form__control" required min="1" value="100">
            </div>
            <div class="form__group">
                <label class="form__label">Passing Year *</label>
                <input type="number" id="brYear" class="form__control" required min="2000" max="2099" placeholder="e.g. 2026">
            </div>
            <button type="submit" class="btn btn--primary" id="btnAdd">Add Result</button>
            <div id="addStatus" class="status" style="display:none;margin-top:0.75rem;"></div>
        </form>
    </section>

    <!-- Filter + List -->
    <section class="panel">
        <header class="panel__header">
            <h2>All Board Results</h2>
            <button class="btn btn--outline btn--sm" id="btnRefresh">Refresh</button>
        </header>
        <div class="filter-bar__group" style="margin-bottom:1rem;">
            <select id="filterSubject" class="filter-bar__control">
                <option value="">All Subjects</option>
                <option value="Accounts">Accounts</option>
                <option value="Commerce">Commerce</option>
            </select>
            <select id="filterYear" class="filter-bar__control">
                <option value="">All Years</option>
            </select>
        </div>
        <div id="listStatus" class="status" style="display:none;margin-bottom:0.75rem;"></div>
        <p id="listCount" style="color:var(--text-muted);font-size:0.85rem;margin-bottom:0.5rem;"></p>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Subject</th>
                        <th>Marks</th>
                        <th>Max</th>
                        <th>%</th>
                        <th>Year</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="listBody">
                    <tr><td colspan="7" class="loading-text">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/app.js"></script>
<script>
const client = window.supabaseClient;
let allResults = [];

async function loadList() {
    const tbody = document.getElementById('listBody');
    const status = document.getElementById('listStatus');
    status.style.display = 'none';
    tbody.innerHTML = '<tr><td colspan="7" class="loading-text">Loading...</td></tr>';

    const { data, error } = await client
        .from('board_results')
        .select('*')
        .order('passing_year', { ascending: false });

    if (error) {
        status.textContent = error.message;
        status.className = 'status status--error';
        status.style.display = 'block';
        tbody.innerHTML = '';
        return;
    }

    allResults = data || [];

    // Populate year filter
    const years = [...new Set(allResults.map(r => r.passing_year))].sort((a, b) => b - a);
    const yearSel = document.getElementById('filterYear');
    const currentYear = yearSel.value;
    yearSel.innerHTML = '<option value="">All Years</option>' + years.map(y => `<option value="${y}">${y}</option>`).join('');
    if (currentYear) yearSel.value = currentYear;

    applyFilters();
}

function applyFilters() {
    const subjectFilter = document.getElementById('filterSubject').value;
    const yearFilter = document.getElementById('filterYear').value;
    const tbody = document.getElementById('listBody');

    const filtered = allResults.filter(r =>
        (!subjectFilter || r.subject === subjectFilter) &&
        (!yearFilter || String(r.passing_year) === yearFilter)
    );

    document.getElementById('listCount').textContent = `${filtered.length} result${filtered.length !== 1 ? 's' : ''}`;

    if (!filtered.length) {
        tbody.innerHTML = '<tr><td colspan="7" class="loading-text">No results found.</td></tr>';
        return;
    }

    tbody.innerHTML = filtered.map(r => {
        const pct = r.max_marks > 0 ? Math.round((r.marks_obtained / r.max_marks) * 100) : 0;
        return `
        <tr>
            <td>${r.student_name || '—'}</td>
            <td>${r.subject || '—'}</td>
            <td>${r.marks_obtained ?? '—'}</td>
            <td>${r.max_marks ?? '—'}</td>
            <td>${pct}%</td>
            <td>${r.passing_year || '—'}</td>
            <td><button class="btn btn--danger btn--sm" onclick="deleteRow('${r.id}')">Delete</button></td>
        </tr>`;
    }).join('');
}

window.deleteRow = async function(id) {
    if (!confirm('Delete this board result permanently?')) return;
    const { error } = await client.from('board_results').delete().eq('id', id);
    if (error) { alert('Delete failed: ' + error.message); return; }
    loadList();
};

document.getElementById('boardResultForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btnAdd');
    const status = document.getElementById('addStatus');
    btn.disabled = true;
    btn.textContent = 'Adding...';
    status.style.display = 'none';

    try {
        const { error } = await client.from('board_results').insert([{
            student_name: document.getElementById('brName').value.trim(),
            subject: document.getElementById('brSubject').value,
            marks_obtained: parseInt(document.getElementById('brMarks').value),
            max_marks: parseInt(document.getElementById('brMaxMarks').value),
            passing_year: parseInt(document.getElementById('brYear').value)
        }]);
        if (error) throw error;

        status.textContent = 'Board result added!';
        status.className = 'status status--success';
        status.style.display = 'block';
        e.target.reset();
        document.getElementById('brMaxMarks').value = '100';
        loadList();
    } catch (err) {
        status.textContent = 'Error: ' + err.message;
        status.className = 'status status--error';
        status.style.display = 'block';
    } finally {
        btn.disabled = false;
        btn.textContent = 'Add Result';
    }
});

document.getElementById('btnRefresh').addEventListener('click', loadList);
document.getElementById('filterSubject').addEventListener('change', applyFilters);
document.getElementById('filterYear').addEventListener('change', applyFilters);
loadList();
</script>
</body>
</html>
